    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uid = null;
        let todosAlunosCache = []; 
        let alunoEditandoId = null; 

        const selectVenc = document.getElementById('aluno-vencimento');
        if(selectVenc) {
            let optionsHTML = '';
            for(let i = 1; i <= 31; i++) {
                optionsHTML += `<option value="${i}">${i}</option>`;
            }
            selectVenc.innerHTML = optionsHTML;
            selectVenc.value = "10";
        }

        // === AUTENTICAÇÃO PADRÃO COM MODO SUPORTE ===
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                let isSuper = false;
                try {
                    const superSnap = await getDoc(doc(db, "super_admins", user.uid));
                    if (superSnap.exists()) isSuper = true;
                } catch(e) {
                    isSuper = false;
                }

                try {
                    if (isSuper) {
                        const equipeImpersonada = sessionStorage.getItem('admin_impersonate');
                        if (equipeImpersonada) {
                            uid = equipeImpersonada; 
                        } else {
                            window.location.href = "super_admin.html";
                            return;
                        }
                    } else {
                        uid = user.uid;
                        const docMestre = await getDoc(doc(db, "equipes", uid));
                        if (!docMestre.exists()) {
                            const colabSnap = await getDoc(doc(db, "colaboradores", uid));
                            if(colabSnap.exists()) {
                                uid = colabSnap.data().equipe_id;
                            }
                        }
                    }
                    
                    await carregarInfoEquipe(user); 
                    buscarAlunosFirebase();
                    
                } catch (error) { console.log(error); }
            } else {
                window.location.href = "index.html";
            }
        });

        async function carregarInfoEquipe(user) {
            const elEmailLogado = document.getElementById('email-logado');
            if (elEmailLogado) elEmailLogado.innerText = user.email;

            try {
                const docSnap = await getDoc(doc(db, "equipes", uid));
                let dadosEquipe = null;
                
                if (docSnap.exists()) {
                    const lblCargo = document.getElementById('lbl-cargo');
                    if(lblCargo) lblCargo.innerText = "Mestre / Administrador";
                    dadosEquipe = docSnap.data();
                } else {
                    const colabSnap = await getDoc(doc(db, "colaboradores", uid));
                    if(colabSnap.exists()) {
                        const lblCargo = document.getElementById('lbl-cargo');
                        if(lblCargo) lblCargo.innerText = "Co-Administrador";
                        
                        const equipeMestreSnap = await getDoc(doc(db, "equipes", uid));
                        if(equipeMestreSnap.exists()) {
                            dadosEquipe = equipeMestreSnap.data();
                        }
                    }
                }

                if (dadosEquipe) {
                    const nomeEquipe = dadosEquipe.nome_equipe;
                    
                    const elNomeEquipe = document.getElementById('nome-equipe') || document.getElementById('lbl-equipe');
                    if(elNomeEquipe) elNomeEquipe.innerText = nomeEquipe.toUpperCase();

                    const elLogo = document.getElementById('container-logo');
                    if (elLogo) {
                        if (dadosEquipe.url_logo) {
                            elLogo.style.background = 'transparent';
                            elLogo.innerHTML = `<img src="${dadosEquipe.url_logo}" class="w-full h-full object-cover" alt="Logo">`;
                        } else {
                            elLogo.style.background = ''; 
                            elLogo.innerHTML = nomeEquipe.charAt(0).toUpperCase();
                        }
                    }
                }
            } catch (error) { console.log(error); }
        }

        function getCorFaixa(faixaTexto) {
            const f = faixaTexto ? faixaTexto.toLowerCase() : '';
            if (f.includes('branca') && !f.includes('cinza') && !f.includes('amarela') && !f.includes('laranja') && !f.includes('verde')) return 'bg-white text-slate-800 border border-slate-300';
            if (f.includes('azul')) return 'bg-blue-600 text-white border border-blue-700';
            if (f.includes('roxa')) return 'bg-purple-600 text-white border border-purple-700';
            if (f.includes('marrom')) return 'bg-amber-800 text-white border border-amber-900';
            if (f.includes('preta')) return 'bg-slate-900 text-white border border-black';
            if (f.includes('cinza')) return 'bg-slate-400 text-white border border-slate-500';
            if (f.includes('amarela')) return 'bg-yellow-400 text-yellow-900 border border-yellow-500';
            if (f.includes('laranja')) return 'bg-orange-500 text-white border border-orange-600';
            if (f.includes('verde')) return 'bg-green-600 text-white border border-green-700';
            return 'bg-slate-100 text-slate-600 border border-slate-200';
        }

        window.mudarAba = function(idAba) {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.add('hidden'));
            document.getElementById(idAba).classList.remove('hidden');
            document.querySelectorAll('.aba-item').forEach(b => b.classList.remove('tab-active', 'text-slate-400'));
            document.getElementById('btn-' + idAba).classList.add('tab-active');
        }

        window.abrirModal = () => {
            mudarAba('aba-pessoal');
            alunoEditandoId = null;
            document.getElementById('modal-titulo').innerText = "Nova Matrícula";
            document.getElementById('btn-gerar-pdf').classList.add('hidden');
            
            document.querySelectorAll('input[type="text"], input[type="date"], input[type="email"]').forEach(i => i.value = '');
            document.querySelectorAll('input[type="checkbox"]').forEach(i => i.checked = false);
            
            document.getElementById('aluno-matricula').value = "Gerada Automática";
            document.getElementById('aluno-faixa').value = "Branca";
            document.getElementById('aluno-grau').value = "Sem grau";
            document.getElementById('aluno-bolsa').value = "0";
            document.getElementById('aluno-status').value = "ATIVO";
            document.getElementById('aluno-vencimento').value = "10";

            document.getElementById('modal-aluno').classList.replace('hidden', 'flex');
        };
        
        window.fecharModal = () => document.getElementById('modal-aluno').classList.replace('flex', 'hidden');

        // === BUSCAR E RENDERIZAR ALUNOS ===
        async function buscarAlunosFirebase() {
            const q = query(collection(db, "alunos"), where("equipe_id", "==", uid));
            try {
                const snap = await getDocs(q);
                todosAlunosCache = [];
                snap.forEach(docSnap => {
                    todosAlunosCache.push({ id: docSnap.id, ...docSnap.data() });
                });
                todosAlunosCache.sort((a, b) => a.nome.localeCompare(b.nome));
                renderizarTabela();
            } catch (err) {
                document.getElementById('tabela-alunos').innerHTML = "<tr><td colspan='7' class='text-center py-10 text-red-500 font-medium'>Erro de ligação à base de dados.</td></tr>";
            }
        }

        window.renderizarTabela = function() {
            const termoBusca = document.getElementById('input-busca').value.toLowerCase();
            const filtroStatus = document.getElementById('filtro-status').value;
            const tabela = document.getElementById('tabela-alunos');
            
            let filtrados = todosAlunosCache.filter(a => {
                let matchTexto = a.nome.toLowerCase().includes(termoBusca) || (a.cpf && a.cpf.includes(termoBusca));
                let matchStatus = filtroStatus === "TODOS" || a.status === filtroStatus;
                return matchTexto && matchStatus;
            });

            let contAtivos = todosAlunosCache.filter(a => a.status === "ATIVO").length;
            document.getElementById('lbl-total-ativos').innerText = "Total Ativos: " + contAtivos;

            tabela.innerHTML = '';
            if(filtrados.length === 0) {
                tabela.innerHTML = "<tr><td colspan='7' class='text-center py-12 text-slate-400'>Nenhum guerreiro encontrado.</td></tr>";
                return;
            }

            filtrados.forEach(a => {
                let idade = '--';
                if(a.data_nascimento) {
                    const dataNascArr = a.data_nascimento.split('-');
                    if(dataNascArr.length === 3) {
                        idade = new Date().getFullYear() - parseInt(dataNascArr[0]);
                    }
                }
                const corBadgeFaixa = getCorFaixa(a.faixa);
                const corStatus = a.status === 'ATIVO' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-rose-100 text-rose-700 border-rose-200';
                
                const tr = document.createElement('tr');
                tr.className = "table-row-hover transition-colors border-b border-slate-50 group cursor-pointer";
                tr.onclick = () => abrirFichaAluno(a.id);
                
                tr.innerHTML = 
                    "<td class='px-4 md:px-6 py-4 text-center' onclick='event.stopPropagation()'>" +
                        "<input type='checkbox' class='chk-merge rounded border-slate-300' value='" + a.id + "' onchange='verificarCheckboxFusao()'>" +
                    "</td>" +
                    "<td class='px-4 md:px-6 py-4 whitespace-normal min-w-[200px]'>" +
                        "<div class='flex items-center'>" +
                            "<div class='hidden md:flex h-8 w-8 rounded-full bg-slate-200 items-center justify-center text-slate-500 font-bold text-xs mr-3 shrink-0'>" + a.nome.charAt(0) + "</div>" +
                            "<div>" +
                                "<div class='font-bold text-slate-700 text-xs md:text-sm group-hover:text-cyan-600 transition-colors'>" + a.nome + "</div>" +
                                "<div class='text-[9px] md:text-[10px] text-slate-400 uppercase tracking-wider'>" + (a.matricula || 'SEM MAT.') + " | " + (a.telefone || 'Sem contato') + "</div>" +
                            "</div>" +
                        "</div>" +
                    "</td>" +
                    "<td class='px-4 md:px-6 py-4 text-center text-[10px] md:text-xs font-mono text-slate-500'>" + (a.cpf || '-') + "</td>" +
                    "<td class='px-4 md:px-6 py-4 text-center'>" +
                        "<span class='px-2 md:px-3 py-1 md:py-1.5 rounded-md text-[9px] md:text-[10px] font-black uppercase tracking-wider shadow-sm " + corBadgeFaixa + "'>" + (a.faixa || 'BRANCA') + "</span>" +
                    "</td>" +
                    "<td class='px-4 md:px-6 py-4 text-center font-bold text-slate-600 text-xs md:text-sm'>" + idade + " <span class='text-[9px] md:text-[10px] text-slate-400 font-normal'>anos</span></td>" +
                    "<td class='px-4 md:px-6 py-4 text-center'>" +
                        "<span class='px-2 py-1 text-[8px] md:text-[9px] font-black rounded border " + corStatus + "'>" + (a.status || 'ATIVO') + "</span>" +
                    "</td>" +
                    "<td class='px-4 md:px-6 py-4 text-center'>" +
                        "<button onclick=\"event.stopPropagation(); excluirAluno('" + a.id + "')\" class='text-rose-400 hover:text-rose-600 p-2 rounded-lg font-bold text-xs transition-colors'>Excluir</button>" +
                    "</td>";
                
                tabela.appendChild(tr);
            });
        }

        window.limparBusca = function() {
            document.getElementById('input-busca').value = '';
            document.getElementById('filtro-status').value = 'ATIVO';
            renderizarTabela();
        }

        window.abrirFichaAluno = function(id) {
            const aluno = todosAlunosCache.find(a => a.id === id);
            if(!aluno) return;

            alunoEditandoId = id;
            document.getElementById('modal-titulo').innerText = "Editar Ficha Cadastral";
            document.getElementById('btn-gerar-pdf').classList.remove('hidden');

            document.getElementById('aluno-matricula').value = aluno.matricula || 'S/N';
            document.getElementById('aluno-nome').value = aluno.nome || '';
            document.getElementById('aluno-cpf').value = aluno.cpf || '';
            document.getElementById('aluno-nasc').value = aluno.data_nascimento || '';
            document.getElementById('aluno-faixa').value = aluno.faixa || 'Branca';
            document.getElementById('aluno-grau').value = aluno.grau || 'Sem grau';
            
            document.getElementById('aluno-tel').value = aluno.telefone || '';
            document.getElementById('aluno-peso').value = aluno.peso || '';
            document.getElementById('aluno-email').value = aluno.email || '';
            document.getElementById('aluno-endereco').value = aluno.endereco || '';
            document.getElementById('aluno-bairro').value = aluno.bairro || '';
            document.getElementById('aluno-numero').value = aluno.numero || '';
            document.getElementById('aluno-cep').value = aluno.cep || '';
            
            document.getElementById('aluno-resp-nome').value = aluno.nome_responsavel || '';
            document.getElementById('aluno-resp-cpf').value = aluno.cpf_responsavel || '';
            document.getElementById('aluno-bolsa').value = aluno.bolsa_perc || '0';
            document.getElementById('aluno-vencimento').value = aluno.dia_vencimento || '10';
            document.getElementById('aluno-status').value = aluno.status || 'ATIVO';

            document.getElementById('lgpd-concordo').checked = aluno.lgpd_concordo || false;
            document.getElementById('lgpd-redes').checked = aluno.lgpd_redes || false;
            document.getElementById('lgpd-site').checked = aluno.lgpd_site || false;
            document.getElementById('lgpd-promo').checked = aluno.lgpd_promo || false;
            document.getElementById('lgpd-relatorio').checked = aluno.lgpd_relatorios || false;

            mudarAba('aba-pessoal');
            document.getElementById('modal-aluno').classList.replace('hidden', 'flex');
        }

        window.salvarAluno = async function() {
            const nome = document.getElementById('aluno-nome').value.toUpperCase();
            if(!nome) return alert("O Nome do guerreiro é obrigatório!");

            const dados = {
                equipe_id: uid,
                nome: nome,
                cpf: document.getElementById('aluno-cpf').value,
                data_nascimento: document.getElementById('aluno-nasc').value,
                faixa: document.getElementById('aluno-faixa').value,
                grau: document.getElementById('aluno-grau').value,
                telefone: document.getElementById('aluno-tel').value,
                peso: document.getElementById('aluno-peso').value,
                email: document.getElementById('aluno-email').value,
                endereco: document.getElementById('aluno-endereco').value,
                bairro: document.getElementById('aluno-bairro').value,
                numero: document.getElementById('aluno-numero').value,
                cep: document.getElementById('aluno-cep').value,
                nome_responsavel: document.getElementById('aluno-resp-nome').value.toUpperCase(),
                cpf_responsavel: document.getElementById('aluno-resp-cpf').value,
                bolsa_perc: parseInt(document.getElementById('aluno-bolsa').value),
                dia_vencimento: parseInt(document.getElementById('aluno-vencimento').value),
                status: document.getElementById('aluno-status').value,
                lgpd_concordo: document.getElementById('lgpd-concordo').checked,
                lgpd_redes: document.getElementById('lgpd-redes').checked,
                lgpd_site: document.getElementById('lgpd-site').checked,
                lgpd_promo: document.getElementById('lgpd-promo').checked,
                lgpd_relatorios: document.getElementById('lgpd-relatorio').checked
            };

            try {
                if (alunoEditandoId) {
                    await updateDoc(doc(db, "alunos", alunoEditandoId), dados);
                } else {
                    const anoAtual = new Date().getFullYear();
                    const novaMatri = anoAtual + (todosAlunosCache.length + 1).toString().padStart(4, '0');
                    dados.matricula = novaMatri;
                    dados.data_cadastro = new Date().toISOString();
                    await addDoc(collection(db, "alunos"), dados);
                }
                fecharModal();
                buscarAlunosFirebase();
            } catch (err) { alert("Erro ao salvar: " + err.message); }
        }

        window.excluirAluno = async (id) => {
            if(confirm("Deseja realmente retirar este guerreiro do seu tatame digital?")) {
                await deleteDoc(doc(db, "alunos", id));
                buscarAlunosFirebase();
            }
        };

        window.verificarCheckboxFusao = function() {
            const chks = document.querySelectorAll('.chk-merge:checked');
            const btn = document.getElementById('btn-fundir');
            if(chks.length === 2) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        window.fundirFichas = async function() {
            const chks = document.querySelectorAll('.chk-merge:checked');
            if(chks.length !== 2) return;
            
            if(!confirm("Deseja unir estas fichas?\nOs dados serão mesclados e a duplicata será apagada.")) return;

            const a1 = todosAlunosCache.find(a => a.id === chks[0].value);
            const a2 = todosAlunosCache.find(a => a.id === chks[1].value);

            let base = a1, novo = a2;
            if(a2.data_cadastro && a1.data_cadastro && a2.data_cadastro < a1.data_cadastro) { base = a2; novo = a1; }

            let dadosFundidos = {};
            Object.keys(base).forEach(key => {
                if (key === 'id' || key === 'equipe_id') return;
                if (key.startsWith('lgpd_')) {
                    dadosFundidos[key] = base[key] || novo[key] || false;
                } else if (key === 'faixa' || key === 'grau') {
                    dadosFundidos[key] = (base[key] && base[key] !== 'Branca' && base[key] !== 'Sem grau') ? base[key] : (novo[key] || base[key]);
                } else {
                    dadosFundidos[key] = (base[key] && String(base[key]).trim() !== "") ? base[key] : novo[key];
                }
            });

            try {
                await updateDoc(doc(db, "alunos", base.id), dadosFundidos);
                await deleteDoc(doc(db, "alunos", novo.id));
                alert("Fichas unidas com sucesso! 🧬");
                buscarAlunosFirebase();
            } catch(err) { alert("Erro ao fundir: " + err.message); }
        }

        window.gerarPDF_LGPD = function() {
            if(!document.getElementById('lgpd-concordo').checked) {
                return alert("Atenção: A caixa de 'Li e Concordo com os Termos' precisa estar marcada.");
            }

            const nome = document.getElementById('aluno-nome').value || '[NOME DO ALUNO]';
            const resp = document.getElementById('aluno-resp-nome').value;
            const repTexto = resp ? " neste ato representado(a) por seu responsável legal " + resp + ", " : " ";
            
            let usos = [];
            if(document.getElementById('lgpd-redes').checked) usos.push("Publicações em redes sociais oficiais da Equipe.");
            if(document.getElementById('lgpd-site').checked) usos.push("Divulgação em site institucional.");
            if(document.getElementById('lgpd-promo').checked) usos.push("Materiais informativos e promocionais.");
            if(document.getElementById('lgpd-relatorio').checked) usos.push("Relatórios e prestação de contas.");

            let listaUsosHtml = "";
            if (usos.length > 0) {
                for(let i=0; i<usos.length; i++) listaUsosHtml += "<p style='margin: 10px 0;'>&bull; " + usos[i] + "</p>";
            } else {
                listaUsosHtml = "<p style='margin: 10px 0;'><i>Nenhuma autorização específica.</i></p>";
            }

            let dataAtual = new Date().toLocaleString('pt-BR');
            let hash = "GERADO-" + Math.random().toString(36).substring(2, 10).toUpperCase() + "-" + Math.random().toString(36).substring(2, 10).toUpperCase();
            
            const alunoCache = todosAlunosCache.find(a => a.nome === nome.toUpperCase());
            if (alunoCache && alunoCache.data_cadastro) {
                let dtStr = alunoCache.data_cadastro;
                
                if (dtStr.includes('T')) {
                    const dt = new Date(dtStr);
                    dataAtual = dt.toLocaleString('pt-BR');
                } 
                else if (dtStr.includes('-') && dtStr.includes(' ')) {
                    let partes = dtStr.split(' ');
                    let datas = partes[0].split('-');
                    if(datas[0].length === 4) {
                        dataAtual = `${datas[2]}/${datas[1]}/${datas[0]} ${partes[1]}`;
                    } else {
                        dataAtual = dtStr;
                    }
                } 
                else {
                    dataAtual = dtStr;
                }

                hash = alunoCache.id.toUpperCase() + "-" + Math.random().toString(36).substring(2, 10).toUpperCase();
            }

            const assinante = (resp || nome).toUpperCase();
            const area = document.getElementById('area-impressao');
            
            area.innerHTML = 
                "<div style='font-family: Arial, Helvetica, sans-serif; max-width: 800px; margin: 0 auto; color: #000; line-height: 1.5;'>" +
                    "<h1 style='text-align: center; font-size: 16px; margin-bottom: 40px; font-weight: bold;'>TERMO DE AUTORIZAÇÃO DE USO DE IMAGEM E DADOS (LGPD)</h1>" +
                    
                    "<p style='text-align: justify; margin-bottom: 30px;'>Pelo presente instrumento, em conformidade com a Lei Geral de Proteção de Dados Pessoais (Lei n&deg; 13.853/2019), o(a) aluno(a) " + nome.toUpperCase() + repTexto + "declara estar ciente e de acordo com as pol&iacute;ticas da Equipe.</p>" +
                    
                    "<p style='font-weight: bold; margin-bottom: 10px;'>Autoriza&ccedil;&atilde;o de Uso de Imagem:</p>" +
                    "<div style='margin-left: 20px; margin-bottom: 30px;'>" + listaUsosHtml + "</div>" +
                    
                    "<p style='font-weight: bold; margin-bottom: 10px;'>Declara&ccedil;&atilde;o de Privacidade:</p>" +
                    "<p style='text-align: justify; margin-bottom: 60px;'>A Equipe declara que n&atilde;o divulgar&aacute; dados pessoais sens&iacute;veis, n&atilde;o comercializar&aacute; imagens e adotar&aacute; medidas de seguran&ccedil;a para prote&ccedil;&atilde;o das informa&ccedil;&otilde;es coletadas.</p>" +
                    
                    "<p style='text-align: center; font-weight: bold; margin-bottom: 20px;'>ACEITE ELETR&Ocirc;NICO / ASSINATURA DIGITAL</p>" +
                    "<p style='text-align: justify; margin-bottom: 30px;'>Este documento foi validado eletronicamente atrav&eacute;s dos dados submetidos pelo formul&aacute;rio oficial de matr&iacute;cula e integrados na base de dados.</p>" +
                    
                    "<p style='margin-bottom: 10px;'>Aceite Registado por: " + assinante + "</p>" +
                    "<p style='margin-bottom: 10px;'>Data e Hora do Registo Oficial: " + dataAtual + "</p>" +
                    "<p style='margin-bottom: 10px;'>C&oacute;digo de Autentica&ccedil;&atilde;o (Hash): " + hash + "</p>" +
                "</div>";

            area.classList.remove('hidden');

            window.print();

            setTimeout(() => {
                area.classList.add('hidden');
            }, 1000);
        }
    </script>
