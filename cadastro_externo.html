<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrícula Digital | BJJ Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden text-slate-800 bg-[#F8FAFC]">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div class="w-full bg-slate-900 p-3 text-center relative z-50 shrink-0 shadow-md flex items-center justify-center h-14">
        <a href="https://www.bjjsystems.com.br" target="_blank" class="absolute left-4 top-1.5 transition-opacity hover:opacity-80">
            <img src="logo_bjj_maneger.png" alt="BJJ Systems" class="h-10 w-auto object-contain">
        </a>
        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest hidden sm:inline-block">Autoatendimento</span>
    </div>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-10 hide-scrollbar" id="interface-sistema">
        <div class="max-w-3xl mx-auto">
            
            <div class="flex justify-center mb-8 mt-4 min-h-[5rem]">
                <img id="logo-equipe" src="" alt="Logo da Equipe" class="h-20 md:h-28 w-auto object-contain drop-shadow-sm hidden">
                <div id="fallback-logo" class="w-24 h-24 rounded-full bg-slate-800 text-white flex items-center justify-center text-4xl font-black hidden shadow-md"></div>
            </div>

            <div class="mb-8 text-center" id="cabecalho-form">
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Carregando formulário...</h2>
            </div>

            <div id="form-aluno" class="space-y-6 hidden">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8">
                    <div class="flex items-center gap-2 mb-6 border-b border-slate-100 pb-4">
                        <span class="text-xl">🥋</span>
                        <h3 class="font-black text-slate-800 uppercase tracking-widest text-sm">Dados Pessoais</h3>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Nome Completo *</label>
                            <input type="text" id="cad-nome" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-cyan-500 transition-all font-bold text-slate-700 uppercase">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">CPF *</label>
                            <input type="text" id="cad-cpf" maxlength="14" oninput="mascaraCPF(this)" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-cyan-500 transition-all font-bold text-slate-700" placeholder="000.000.000-00">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Data de Nascimento *</label>
                            <input type="date" id="cad-nasc" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-cyan-500 transition-all font-bold text-slate-700">
                        </div>
                    </div>
                </div>

                <div class="bg-amber-50 rounded-3xl shadow-sm border border-amber-200 p-6 md:p-8">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="cad-lgpd-termos" class="w-6 h-6 rounded text-amber-600 border-slate-300 focus:ring-amber-500">
                        <span class="text-sm font-black text-slate-800 uppercase tracking-widest">Confirmo que meus dados estão corretos *</span>
                    </label>
                </div>

                <button onclick="salvarMatricula()" id="btn-salvar" class="w-full bg-[#10B981] hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-widest text-lg">FINALIZAR MATRÍCULA</button>
            </div>

            <div id="form-prof" class="space-y-6 hidden">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8">
                    <div class="flex items-center gap-2 mb-6 border-b border-slate-100 pb-4">
                        <span class="text-xl">👥</span>
                        <h3 class="font-black text-slate-800 uppercase tracking-widest text-sm">Registro de Co-Administrador(a)</h3>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Nome Completo *</label>
                            <input type="text" id="prof-nome" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 font-bold text-slate-700 uppercase">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">E-mail Profissional *</label>
                                <input type="email" id="prof-email" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 font-bold text-slate-700">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Criar Senha *</label>
                                <input type="password" id="prof-senha" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 font-bold text-slate-700" placeholder="Mínimo 8 caracteres">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-indigo-50 rounded-3xl shadow-sm border border-indigo-200 p-6 md:p-8 space-y-6">
                    <div class="flex items-center gap-2 border-b border-indigo-200/50 pb-4">
                        <span class="text-xl">🔐</span>
                        <h3 class="font-black text-indigo-900 uppercase tracking-widest text-sm">Termos e Sigilo (LGPD)</h3>
                    </div>
                    
                    <p class="text-sm text-indigo-900 leading-relaxed">
                        Ao se tornar um Co-Administrador(a), você terá acesso a dados confidenciais e compromete-se a utilizá-los exclusivamente para fins administrativos da equipe.
                    </p>

                    <div class="bg-white p-6 rounded-xl border border-indigo-100 shadow-sm">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="prof-lgpd-termos" class="w-6 h-6 rounded text-indigo-600 border-slate-300 focus:ring-indigo-500">
                            <span class="text-sm font-black text-slate-800 uppercase tracking-widest leading-relaxed">
                                Li e aceito os <a href="termo.html" target="_blank" class="text-indigo-600 underline decoration-2 underline-offset-2 hover:text-indigo-800">Termos de Uso e Privacidade</a> *
                            </span>
                        </label>
                    </div>
                </div>

                <div class="pt-6 pb-8">
                    <button onclick="salvarProfessor()" id="btn-salvar-prof" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-widest text-lg">CRIAR ACESSO</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const paramsUrl = new URLSearchParams(window.location.search);
        const tipoAcesso = paramsUrl.get('tipo'); 
        const equipeId = paramsUrl.get('equipe');

        window.showToast = function(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'} text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 font-bold text-sm z-50 pointer-events-auto`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        window.mascaraCPF = (i) => {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        };

        window.onload = async () => {
            if(!equipeId) return;
            try {
                const docEquipe = await getDoc(doc(db, "equipes", equipeId));
                if (docEquipe.exists()) {
                    const dados = docEquipe.data();
                    document.getElementById('cabecalho-form').innerHTML = `<h2 class="text-2xl font-black text-slate-800 uppercase">${tipoAcesso === 'prof' ? 'Acesso ao Sistema' : 'Ficha de Matrícula'}</h2><p class='text-sm mt-1'>Equipe: <b>${dados.nome_equipe}</b></p>`;
                    if(dados.url_logo) { document.getElementById('logo-equipe').src = dados.url_logo; document.getElementById('logo-equipe').classList.remove('hidden'); }
                    else { document.getElementById('fallback-logo').innerText = dados.nome_equipe.charAt(0); document.getElementById('fallback-logo').classList.remove('hidden'); }
                }
                if(tipoAcesso === 'prof') document.getElementById('form-prof').classList.remove('hidden');
                else document.getElementById('form-aluno').classList.remove('hidden');
            } catch (e) { document.getElementById('cabecalho-form').innerHTML = `<h2 class="text-rose-500 font-black">Erro de conexão</h2>`; }
        };

        window.salvarMatricula = async () => {
            const nome = document.getElementById('cad-nome').value.toUpperCase().trim();
            if (!nome || !document.getElementById('cad-lgpd-termos').checked) return showToast("Preencha os campos e confirme os dados!");
            const mat = new Date().getFullYear().toString() + (Math.floor(Math.random() * 9000) + 1000).toString();
            try {
                await addDoc(collection(db, "alunos"), { equipe_id: equipeId, matricula: mat, nome, status: "ATIVO", data_cadastro: new Date().toISOString() });
                document.getElementById('form-aluno').innerHTML = `<div class='text-center p-10 bg-emerald-50 rounded-3xl'><h2 class='text-2xl font-black text-emerald-800'>Concluído!</h2><p>Sua matrícula: ${mat}</p></div>`;
            } catch (e) { showToast("Erro ao salvar."); }
        };

        window.salvarProfessor = async () => {
            const nome = document.getElementById('prof-nome').value.toUpperCase().trim();
            const email = document.getElementById('prof-email').value.trim().toLowerCase();
            const senha = document.getElementById('prof-senha').value;
            if(!nome || !email || senha.length < 8 || !document.getElementById('prof-lgpd-termos').checked) return showToast("Dados incompletos ou senha curta!");
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, senha);
                await setDoc(doc(db, "colaboradores", cred.user.uid), { nome, email, equipe_id: equipeId, data_cadastro: new Date().toISOString() });
                await signOut(auth);
                document.getElementById('form-prof').innerHTML = `<div class='text-center p-10 bg-indigo-50 rounded-3xl'><h2 class='text-2xl font-black text-indigo-800'>Acesso Criado!</h2><p class='mt-2'>Faça login na tela inicial.</p></div>`;
            } catch (e) { showToast("Erro ao criar acesso."); }
        };
    </script>
</body>
</html>
