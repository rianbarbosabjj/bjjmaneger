<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Currículo de Atleta | BJJ Manager</title>
    
    <link rel="icon" type="image/png" href="logo_bjj_maneger.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800 bg-[#F8FAFC]">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div id="interface-sistema" class="flex w-full h-full relative">

        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            
            <div class="flex-1 overflow-hidden p-4 md:p-8 pb-20 md:pb-8 flex flex-col md:flex-row gap-6 max-w-7xl mx-auto w-full h-full">
                
                <div id="painel-lista" class="w-full md:w-1/3 flex flex-col h-full bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden shrink-0">
                    <div class="p-5 border-b border-slate-100 bg-slate-50 shrink-0">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black text-slate-800">Selecione o Atleta</h3>
                        </div>
                        <div class="relative w-full">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">🔍</div>
                            <input type="text" id="input-busca" onkeyup="filtrarLista()" class="bg-white border border-slate-200 text-slate-900 text-sm rounded-xl w-full pl-9 p-3 outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all" placeholder="Buscar atleta...">
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto hide-scrollbar" id="lista-alunos">
                        <div class="p-8 text-center text-slate-400 text-sm font-medium">Buscando guerreiros...</div>
                    </div>
                </div>

                <div id="painel-curriculo" class="w-full md:w-2/3 hidden flex-col h-full gap-4 md:gap-6 overflow-hidden pb-6">
                    
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 md:p-6 flex justify-between items-center shrink-0">
                        <div class="flex items-center gap-3 sm:gap-4">
                            <button onclick="voltarLista()" class="md:hidden flex items-center justify-center w-10 h-10 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 transition-colors shrink-0">
                                <span class="text-xl">🔙</span>
                            </button>
                            <div class="flex-1 overflow-hidden">
                                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Currículo Desportivo</h2>
                                <h2 class="text-lg md:text-2xl font-black text-slate-800 truncate" id="aluno-nome-detalhe">Nome do Aluno</h2>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden relative">
                        <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
                            <h3 class="font-black text-slate-800 text-sm uppercase tracking-widest"><span class="mr-2">👁️</span> Pré-visualização</h3>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50/50">
                            <pre id="curriculo-preview" class="font-mono text-xs md:text-sm text-slate-700 whitespace-pre-wrap word-wrap break-words bg-white p-6 rounded-xl border border-slate-200 shadow-inner w-full min-h-full">Carregando histórico do atleta...</pre>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 md:gap-4 shrink-0">
                        <button onclick="exportarTXT()" class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-white font-black py-4 px-4 rounded-2xl shadow-md transition-transform transform hover:-translate-y-1 uppercase tracking-widest text-xs md:text-sm flex items-center justify-center">
                            <span class="mr-2 text-lg">📄</span> Exportar TXT
                        </button>
                        <button onclick="exportarPDF()" id="btn-exportar-pdf" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-black py-4 px-4 rounded-2xl shadow-md transition-transform transform hover:-translate-y-1 uppercase tracking-widest text-xs md:text-sm flex items-center justify-center">
                            <span class="mr-2 text-lg">📕</span> Exportar PDF
                        </button>
                    </div>
                </div>
                
                <div id="painel-vazio" class="hidden md:flex w-full md:w-2/3 h-full flex-col items-center justify-center bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-center p-10">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center text-4xl shadow-sm border border-slate-100 mb-4">📄</div>
                    <h3 class="text-xl font-black text-slate-700 mb-2">Currículo Desportivo</h3>
                    <p class="text-slate-400 text-sm max-w-sm">Pesquise e selecione um aluno na lista ao lado para gerar o seu currículo em TXT ou baixar em PDF oficial.</p>
                </div>

            </div>

        </main>
    </div>

    <script src="menu.js"></script>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uid = null;
        let equipeNomeGlobal = "PROJETO RESGATE";
        let equipeLogoGlobal = null; 
        
        let alunosCache = [];
        let alunoSelecionado = null;
        let gradCache = [];
        let compCache = [];

        // --- SISTEMA DE TOASTS ---
        window.showToast = function(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-emerald-500' : (type === 'error' ? 'bg-rose-500' : 'bg-slate-800');
            const icon = type === 'success' ? '✅' : (type === 'error' ? '🚨' : 'ℹ️');
            
            toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-full opacity-0 flex items-center gap-3 font-bold text-sm z-50 pointer-events-auto max-w-sm`;
            toast.innerHTML = `<span class="text-xl">${icon}</span> <span class="flex-1">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4500);
        }

        // =====================================================================================
        // 🔥 LÓGICA DE AUTENTICAÇÃO BLINDADA COM MODO SUPORTE
        // =====================================================================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                let isSuper = false;
                try {
                    const superSnap = await getDoc(doc(db, "super_admins", user.uid));
                    if (superSnap.exists()) isSuper = true;
                } catch(e) {
                    isSuper = false;
                }

                try {
                    if (isSuper) {
                        const equipeImpersonada = sessionStorage.getItem('admin_impersonate');
                        if (equipeImpersonada) {
                            uid = equipeImpersonada; 
                        } else {
                            window.location.href = "super_admin.html";
                            return;
                        }
                    } else {
                        uid = user.uid;
                        const docMestre = await getDoc(doc(db, "equipes", uid));
                        if (!docMestre.exists()) {
                            const colabSnap = await getDoc(doc(db, "colaboradores", uid));
                            if(colabSnap.exists()) {
                                uid = colabSnap.data().equipe_id;
                            }
                        }
                    }

                    await carregarInfoEquipe(user); 
                    carregarAlunos(); 

                } catch (error) { console.log(error); }
            } else {
                window.location.href = "index.html";
            }
        });

        async function carregarInfoEquipe(user) {
            const elEmailLogado = document.getElementById('email-logado');
            if (elEmailLogado) elEmailLogado.innerText = user.email;

            try {
                const docSnap = await getDoc(doc(db, "equipes", uid));
                let dadosEquipe = null;
                
                if (docSnap.exists()) {
                    const lblCargo = document.getElementById('lbl-cargo');
                    if(lblCargo) lblCargo.innerText = "Mestre / Administrador";
                    dadosEquipe = docSnap.data();
                } else {
                    const colabSnap = await getDoc(doc(db, "colaboradores", uid));
                    if(colabSnap.exists()) {
                        uid = colabSnap.data().equipe_id; 
                        const lblCargo = document.getElementById('lbl-cargo');
                        if(lblCargo) lblCargo.innerText = "Co-Administrador";
                        
                        const equipeMestreSnap = await getDoc(doc(db, "equipes", uid));
                        if(equipeMestreSnap.exists()) {
                            dadosEquipe = equipeMestreSnap.data();
                        }
                    }
                }

                if (dadosEquipe) {
                    equipeNomeGlobal = dadosEquipe.nome_equipe;
                    equipeLogoGlobal = dadosEquipe.url_logo; 
                    
                    const elNomeEquipe = document.getElementById('nome-equipe') || document.getElementById('lbl-equipe');
                    if(elNomeEquipe) elNomeEquipe.innerText = equipeNomeGlobal.toUpperCase();

                    const elLogo = document.getElementById('container-logo');
                    if (elLogo) {
                        if (equipeLogoGlobal) {
                            elLogo.style.background = 'transparent';
                            elLogo.innerHTML = `<img src="${equipeLogoGlobal}" class="w-full h-full object-cover" alt="Logo">`;
                        } else {
                            elLogo.style.background = ''; 
                            elLogo.innerHTML = equipeNomeGlobal.charAt(0).toUpperCase();
                        }
                    }
                }
            } catch (error) { console.log(error); }
        }

        function getCorFaixa(faixaTexto) {
            const f = faixaTexto ? faixaTexto.toLowerCase() : '';
            if (f.includes('cinza e branca')) return 'bg-[linear-gradient(135deg,_#94A3B8_50%,_#FFFFFF_50%)] text-slate-800 border border-slate-300';
            if (f.includes('cinza e preta')) return 'bg-[linear-gradient(135deg,_#94A3B8_50%,_#0F172A_50%)] text-white border border-slate-500';
            if (f.includes('amarela e branca')) return 'bg-[linear-gradient(135deg,_#FACC15_50%,_#FFFFFF_50%)] text-slate-800 border border-yellow-500';
            if (f.includes('amarela e preta')) return 'bg-[linear-gradient(135deg,_#FACC15_50%,_#0F172A_50%)] text-white border border-yellow-500';
            if (f.includes('laranja e branca')) return 'bg-[linear-gradient(135deg,_#F97316_50%,_#FFFFFF_50%)] text-slate-800 border border-orange-500';
            if (f.includes('laranja e preta')) return 'bg-[linear-gradient(135deg,_#F97316_50%,_#0F172A_50%)] text-white border border-orange-500';
            if (f.includes('verde e branca')) return 'bg-[linear-gradient(135deg,_#16A34A_50%,_#FFFFFF_50%)] text-slate-800 border border-green-600';
            if (f.includes('verde e preta')) return 'bg-[linear-gradient(135deg,_#16A34A_50%,_#0F172A_50%)] text-white border border-green-600';
            if (f.includes('branca')) return 'bg-white text-slate-800 border border-slate-300';
            if (f.includes('cinza')) return 'bg-slate-400 text-white border border-slate-500';
            if (f.includes('amarela')) return 'bg-yellow-400 text-yellow-900 border border-yellow-500';
            if (f.includes('laranja')) return 'bg-orange-500 text-white border border-orange-600';
            if (f.includes('verde')) return 'bg-green-600 text-white border border-green-700';
            if (f.includes('azul')) return 'bg-blue-600 text-white border border-blue-700';
            if (f.includes('roxa')) return 'bg-purple-600 text-white border border-purple-700';
            if (f.includes('marrom')) return 'bg-amber-800 text-white border border-amber-900';
            if (f.includes('preta')) return 'bg-slate-900 text-white border border-slate-900';
            return 'bg-slate-100 text-slate-600 border border-slate-200';
        }

        function formatarFaixaGrau(faixa, grau) {
            const faixaStr = faixa || 'Branca';
            const grauStr = grau || 'Sem grau';
            
            if (grauStr.toLowerCase() === 'sem grau') {
                return `Faixa ${faixaStr}`;
            }
            return `Faixa ${faixaStr} (${grauStr})`;
        }

        function calcularIdade(dataNascStr) {
            if (!dataNascStr) return "Não informada";
            try {
                let dt;
                if(dataNascStr.includes('T')) dt = new Date(dataNascStr);
                else if(dataNascStr.includes('-')) {
                    const p = dataNascStr.split('-');
                    dt = new Date(p[0], p[1]-1, p[2]);
                } else return "Não informada";

                const hoje = new Date();
                let idade = hoje.getFullYear() - dt.getFullYear();
                const m = hoje.getMonth() - dt.getMonth();
                if (m < 0 || (m === 0 && hoje.getDate() < dt.getDate())) idade--;
                
                return `${idade} anos`;
            } catch(e) { return "Não informada"; }
        }

        async function carregarAlunos() {
            try {
                const q = query(collection(db, "alunos"), where("equipe_id", "==", uid), where("status", "==", "ATIVO"));
                const snap = await getDocs(q);
                alunosCache = [];
                snap.forEach(docSnap => {
                    alunosCache.push({ id: docSnap.id, ...docSnap.data() });
                });
                
                alunosCache.sort((a, b) => a.nome.localeCompare(b.nome));
                renderizarListaAlunos(alunosCache);
            } catch (err) {
                document.getElementById('lista-alunos').innerHTML = `<p class='text-center p-5 text-rose-500'>Erro ao carregar guerreiros.</p>`;
            }
        }

        function renderizarListaAlunos(lista) {
            const container = document.getElementById('lista-alunos');
            container.innerHTML = '';
            
            if(lista.length === 0) {
                container.innerHTML = `<p class='text-center p-8 text-slate-400 text-sm font-medium'>Nenhum aluno encontrado.</p>`;
                return;
            }

            lista.forEach(aluno => {
                const corFaixa = getCorFaixa(aluno.faixa);
                
                const item = document.createElement('div');
                item.className = "p-4 border-b border-slate-50 hover:bg-slate-100 cursor-pointer transition-colors flex items-center justify-between group";
                item.onclick = () => selecionarAluno(aluno.id);
                
                item.innerHTML = `
                    <div class="flex flex-col truncate pr-3">
                        <span class="font-bold text-slate-700 text-xs md:text-sm group-hover:text-cyan-600 transition-colors truncate">${aluno.nome}</span>
                        <span class="text-[9px] md:text-[10px] text-slate-400 uppercase font-bold mt-0.5">${aluno.grau || 'Sem grau'}</span>
                    </div>
                    <div class="w-3 h-3 md:w-4 md:h-4 rounded-full shadow-sm ${corFaixa} shrink-0" title="${aluno.faixa}"></div>
                `;
                container.appendChild(item);
            });
        }

        window.filtrarLista = function() {
            const termo = document.getElementById('input-busca').value.toLowerCase();
            const filtrados = alunosCache.filter(a => a.nome.toLowerCase().includes(termo));
            renderizarListaAlunos(filtrados);
        }

        window.selecionarAluno = async function(id) {
            alunoSelecionado = alunosCache.find(a => a.id === id);
            if(!alunoSelecionado) return;

            document.getElementById('painel-vazio').classList.add('hidden');
            document.getElementById('painel-vazio').classList.remove('md:flex');
            
            const painelHistorico = document.getElementById('painel-curriculo');
            painelHistorico.classList.remove('hidden');
            painelHistorico.classList.add('flex');

            const painelLista = document.getElementById('painel-lista');
            painelLista.classList.add('hidden', 'md:flex'); 
            painelLista.classList.remove('flex');

            document.getElementById('aluno-nome-detalhe').innerText = alunoSelecionado.nome || "Atleta";
            document.getElementById('curriculo-preview').innerText = "Carregando histórico do atleta...";

            try {
                const qGrad = query(collection(db, "graduacoes"), where("equipe_id", "==", uid), where("aluno_id", "==", id));
                const qComp = query(collection(db, "competicoes"), where("equipe_id", "==", uid), where("aluno_id", "==", id));
                
                const [snapGrad, snapComp] = await Promise.all([getDocs(qGrad), getDocs(qComp)]);
                
                gradCache = [];
                snapGrad.forEach(doc => gradCache.push(doc.data()));
                
                compCache = [];
                snapComp.forEach(doc => compCache.push(doc.data()));

                const getTempoOrdenacao = (val) => {
                    if (!val) return 0;
                    if (typeof val.toDate === 'function') return val.toDate().getTime();
                    if (val.seconds) return val.seconds * 1000;
                    const d = new Date(val);
                    return isNaN(d.getTime()) ? 0 : d.getTime();
                };

                gradCache.sort((a, b) => getTempoOrdenacao(b.data) - getTempoOrdenacao(a.data));
                compCache.sort((a, b) => getTempoOrdenacao(b.data) - getTempoOrdenacao(a.data));

                gerarPreviewCurriculo();

            } catch(e) {
                console.error("Erro capturado:", e);
                showToast("Erro ao carregar dados.", "error");
                document.getElementById('curriculo-preview').innerText = "Erro ao carregar dados. Detalhe: " + e.message;
            }
        }

        window.voltarLista = function() {
            const painelLista = document.getElementById('painel-lista');
            painelLista.classList.remove('hidden', 'md:flex');
            painelLista.classList.add('flex');
            
            const painelHistorico = document.getElementById('painel-curriculo');
            painelHistorico.classList.add('hidden');
            painelHistorico.classList.remove('flex');
        }

        function formatarDataBR(dataStr) {
            if(!dataStr) return "--";
            if(typeof dataStr === 'string' && dataStr.includes('-')) {
                const p = dataStr.split('-');
                if(p.length >= 3) return `${p[2]}/${p[1]}/${p[0]}`;
            }
            if(dataStr && typeof dataStr.toDate === 'function') {
                return dataStr.toDate().toLocaleDateString('pt-BR');
            }
            return String(dataStr);
        }

        function gerarPreviewCurriculo() {
            if(!alunoSelecionado) return;
            
            try {
                const idade = calcularIdade(alunoSelecionado.data_nascimento);
                const pesoStr = alunoSelecionado.peso ? `${alunoSelecionado.peso} kg` : "Não informado";
                
                let texto = "========================================================\n";
                texto += "            CURRÍCULO ESPORTIVO - JIU-JITSU            \n";
                texto += "========================================================\n\n";
                
                texto += "📋 DADOS DO ATLETA\n";
                texto += `Nome: ${alunoSelecionado.nome || '--'}\n`;
                texto += `Equipe: ${equipeNomeGlobal || '--'}\n`;
                texto += `Idade: ${idade}  |  Peso: ${pesoStr}\n`;
                texto += `Graduação Atual: ${formatarFaixaGrau(alunoSelecionado.faixa, alunoSelecionado.grau)}\n\n`;
                texto += "--------------------------------------------------------\n\n";
                
                texto += "🥋 HISTÓRICO DE GRADUAÇÃO\n";
                if (gradCache && gradCache.length > 0) {
                    gradCache.forEach(g => {
                        texto += ` • ${formatarDataBR(g.data)} - ${formatarFaixaGrau(g.faixa, g.grau)}\n`;
                    });
                } else {
                    texto += " • Nenhum registro de graduação encontrado.\n";
                }
                texto += "\n--------------------------------------------------------\n\n";
                
                texto += "🏆 PORTFÓLIO DE COMPETIÇÕES\n";
                if (compCache && compCache.length > 0) {
                    compCache.forEach(c => {
                        const col = c.colocacao ? String(c.colocacao) : "";
                        const destaque = (col.includes("1º") || col.includes("2º") || col.includes("3º")) ? "🏅 " : " • ";
                        texto += `${destaque}${formatarDataBR(c.data)} | ${col.toUpperCase() || 'PARTICIPAÇÃO'} - ${c.nome_evento || 'Evento não informado'} (Cat: ${c.categoria || '--'} / ${c.peso || 'Geral'})\n`;
                    });
                } else {
                    texto += " • Nenhum registro de competição encontrado.\n";
                }
                
                texto += "\n========================================================\n";
                texto += `Currículo gerado através do site BJJ Manager - www.bjjdigital.com.br em ${new Date().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'})}\n`;
                
                document.getElementById('curriculo-preview').innerText = texto;
            } catch (err) {
                console.error("Erro no Preview:", err);
                document.getElementById('curriculo-preview').innerText = "Falha ao gerar o texto do currículo. Detalhe: " + err.message;
            }
        }

        window.exportarTXT = function() {
            if(!alunoSelecionado) return;
            const texto = document.getElementById('curriculo-preview').innerText;
            
            const blob = new Blob([texto], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Curriculo_${alunoSelecionado.nome.replace(/\s+/g, '_')}.txt`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.exportarPDF = async function() {
            if(!alunoSelecionado) return;
            
            const btn = document.getElementById('btn-exportar-pdf');
            const btnTextoOriginal = btn.innerHTML;
            btn.innerHTML = "<span class='mr-2 text-lg'>⏳</span> Gerando PDF...";

            const idade = calcularIdade(alunoSelecionado.data_nascimento);
            const pesoStr = alunoSelecionado.peso ? `${alunoSelecionado.peso} kg` : "Não informado";
            const dataHoraAtual = new Date().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'});

            const getBase64Image = (url) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = "Anonymous"; 
                    
                    const cacheBuster = url.includes('?') ? '&' : '?';
                    img.src = url + cacheBuster + new Date().getTime();

                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            resolve(canvas.toDataURL('image/png'));
                        } catch (err) {
                            resolve(null);
                        }
                    };

                    img.onerror = () => {
                        resolve(null);
                    };
                });
            };

            let logoFinal = "";
            if (equipeLogoGlobal) {
                logoFinal = await getBase64Image(equipeLogoGlobal);
            }

            let logoHtml = "";
            if (logoFinal) {
                logoHtml = `<img src="${logoFinal}" alt="Logo Equipe" style="display: block; margin: 0 auto 20px auto; max-height: 120px; width: auto;">`;
            } else {
                logoHtml = `<div style="height: 100px; width: 100px; background-color: #0F172A; color: #FFFFFF; border-radius: 50%; text-align: center; line-height: 100px; font-size: 46px; font-weight: bold; margin: 0 auto 20px auto; font-family: Arial, sans-serif;">${equipeNomeGlobal.charAt(0).toUpperCase()}</div>`;
            }

            let gradHtml = "";
            if (gradCache && gradCache.length > 0) {
                gradCache.forEach(g => {
                    gradHtml += `<div style="page-break-inside: avoid; margin: 6px 0; font-size: 14px;"><b>&bull;</b> ${formatarDataBR(g.data)} - ${formatarFaixaGrau(g.faixa, g.grau)}</div>`;
                });
            } else {
                gradHtml = `<div style="page-break-inside: avoid; margin: 6px 0; font-size: 14px; color: #64748b;">Nenhum registro de graduação.</div>`;
            }

            let compHtml = "";
            if (compCache && compCache.length > 0) {
                compCache.forEach(c => {
                    const col = c.colocacao ? String(c.colocacao) : "";
                    const textoCol = (col.includes("1º") || col.includes("2º") || col.includes("3º")) ? `<b>${col.toUpperCase() || '--'}</b>` : col.toUpperCase();
                    compHtml += `<div style="page-break-inside: avoid; margin: 6px 0; font-size: 14px;"><b>&bull;</b> ${formatarDataBR(c.data)} | ${textoCol} - ${c.nome_evento || 'Evento não informado'} (Cat: ${c.categoria || '--'} / ${c.peso || 'Geral'})</div>`;
                });
            } else {
                compHtml = `<div style="page-break-inside: avoid; margin: 6px 0; font-size: 14px; color: #64748b;">Nenhum registro de campeonato.</div>`;
            }

            const elementoVirtual = document.createElement('div');
            elementoVirtual.innerHTML = `
                <div style="font-family: Helvetica, Arial, sans-serif; padding: 20px 40px; color: #1E293B; line-height: 1.5; background-color: #FFFFFF; width: 100%;">
                    
                    <div style="text-align: center; margin-bottom: 30px; page-break-inside: avoid;">
                        ${logoHtml}
                        <h2 style="font-size: 22px; font-weight: bold; color: #1E293B; margin: 0;">CURRÍCULO ESPORTIVO - JIU-JITSU</h2>
                    </div>

                    <div style="page-break-inside: avoid; margin-bottom: 30px;">
                        <h3 style="font-size: 16px; font-weight: bold; color: #06B6D4; margin-top: 0; margin-bottom: 5px; border-bottom: 1px solid #E2E8F0; padding-bottom: 5px;">DADOS DO ATLETA</h3>
                        <div style="margin: 8px 0; font-size: 14px;"><b>Nome:</b> ${alunoSelecionado.nome || '--'}</div>
                        <div style="margin: 8px 0; font-size: 14px;"><b>Equipe / Filial:</b> ${equipeNomeGlobal || '--'}</div>
                        <div style="margin: 8px 0; font-size: 14px;"><b>Idade:</b> ${idade} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <b>Peso:</b> ${pesoStr}</div>
                        <div style="margin: 8px 0; font-size: 14px;"><b>Graduação Atual:</b> ${formatarFaixaGrau(alunoSelecionado.faixa, alunoSelecionado.grau)}</div>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <h3 style="font-size: 16px; font-weight: bold; color: #06B6D4; margin-bottom: 5px; border-bottom: 1px solid #E2E8F0; padding-bottom: 5px; page-break-inside: avoid;">HISTÓRICO DE GRADUAÇÃO</h3>
                        <div style="margin-left: 10px;">${gradHtml}</div>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <h3 style="font-size: 16px; font-weight: bold; color: #06B6D4; margin-bottom: 5px; border-bottom: 1px solid #E2E8F0; padding-bottom: 5px; page-break-inside: avoid;">PORTFÓLIO DE COMPETIÇÕES</h3>
                        <div style="margin-left: 10px;">${compHtml}</div>
                    </div>

                    <div style="margin-top: 50px; text-align: center; border-top: 1px solid #E2E8F0; padding-top: 15px; page-break-inside: avoid;">
                        <p style="font-size: 9px; color: #94A3B8; margin: 0;">Currículo gerado através do site BJJ Manager - <a href="https://www.bjjdigital.com.br" style="color: #94A3B8; text-decoration: none;">www.bjjdigital.com.br</a> em ${dataHoraAtual}</p>
                    </div>
                </div>
            `;

            const opt = {
                margin:       [10, 0, 10, 0], 
                filename:     `Curriculo_${(alunoSelecionado.nome||'Atleta').replace(/\s+/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
            };

            html2pdf().set(opt).from(elementoVirtual).save().then(() => {
                btn.innerHTML = btnTextoOriginal; 
            }).catch(err => {
                console.error("Erro ao gerar PDF: ", err);
                btn.innerHTML = btnTextoOriginal;
                showToast("Erro ao gerar PDF.", "error");
            });
        }

        window.sairDoSistema = () => signOut(auth).then(() => window.location.href = "index.html");

    </script>
</body>
</html>
