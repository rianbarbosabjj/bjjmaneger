<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro | BJJ Manager</title>
    <link rel="icon" type="image/png" href="logo_bjj_maneger.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F1F5F9; }
        .card-premium { background: white; border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 20px; }
        .tab-active { border-bottom: 3px solid #06B6D4; color: #06B6D4; font-weight: 800; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input, select { border-radius: 10px; border: 1px solid #E2E8F0; }
    </style>
</head>
<body class="flex h-[100dvh] overflow-hidden text-slate-800">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div id="interface-sistema" class="flex w-full h-full relative">
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            
            <div class="bg-slate-900 text-white p-4 shrink-0 flex flex-col xl:flex-row justify-between items-center gap-4 z-10 shadow-md">
                <div class="flex items-center gap-3">
                    <span class="text-xl">💰</span>
                    <select id="filtro-mes" class="bg-slate-800 border-none text-white text-xs font-bold rounded-lg p-2 outline-none">
                        <option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option><option value="04">Abr</option>
                        <option value="05">Mai</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option>
                        <option value="09">Set</option><option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
                    </select>
                    <select id="filtro-ano" class="bg-slate-800 border-none text-white text-xs font-bold rounded-lg p-2 outline-none">
                        <option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option>
                    </select>
                    <button onclick="carregarDados()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold transition-all">Atualizar</button>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex bg-slate-800 p-1.5 rounded-xl border border-slate-700 items-center gap-2">
                        <input type="text" id="config-prazo" oninput="mascaraMoeda(this)" class="w-16 bg-slate-900 border-none text-white text-center text-xs font-bold p-1" value="70,00">
                        <input type="text" id="config-atraso" oninput="mascaraMoeda(this)" class="w-16 bg-slate-900 border-none text-rose-400 text-center text-xs font-bold p-1" value="100,00">
                        <button onclick="salvarConfiguracaoGeral()" class="text-xs">💾</button>
                    </div>
                    <button onclick="abrirModalRelatorio()" class="bg-amber-500 px-4 py-2 rounded-lg text-xs font-bold text-white shadow-sm">📊 Relatório</button>
                </div>
            </div>

            <div class="bg-white border-b border-slate-200 px-4 md:px-8 overflow-x-auto hide-scrollbar">
                <div class="max-w-7xl mx-auto flex gap-8">
                    <button onclick="mudarAba('tab-dash')" id="btn-tab-dash" class="aba-item py-4 text-xs font-black uppercase tracking-widest tab-active whitespace-nowrap">📊 Resumo</button>
                    <button onclick="mudarAba('tab-mensalidades')" id="btn-tab-mensalidades" class="aba-item py-4 text-xs font-black uppercase tracking-widest text-slate-400 whitespace-nowrap">👥 Mensalidades</button>
                    <button onclick="mudarAba('tab-config-asaas')" id="btn-tab-config-asaas" class="aba-item py-4 text-xs font-black uppercase tracking-widest text-blue-500 whitespace-nowrap">⚙️ Recebimento Digital</button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                <div class="max-w-7xl mx-auto space-y-6">

                    <div id="tab-dash" class="aba-content flex flex-col gap-6">
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                            <div class="card-premium p-8 text-center"><p class="text-[10px] font-black text-slate-400 uppercase">Recebido</p><h3 class="text-3xl font-black text-emerald-500" id="lbl-resumo-pago">R$ 0,00</h3></div>
                            <div class="card-premium p-8 text-center"><p class="text-[10px] font-black text-slate-400 uppercase">A Receber</p><h3 class="text-3xl font-black text-rose-500" id="lbl-resumo-pendente">R$ 0,00</h3></div>
                            <div class="card-premium bg-slate-900 p-8 text-center text-white"><p class="text-[10px] font-black text-slate-500 uppercase">Status do Mês</p><h3 class="text-3xl font-black" id="dash-saldo-txt">OK</h3></div>
                        </div>
                    </div>

                    <div id="tab-mensalidades" class="aba-content hidden flex flex-col gap-6">
                        <div class="flex justify-between items-center mb-4">
                            <input type="text" id="input-busca-mens" onkeyup="filtrarMensalidades()" class="p-3 text-xs w-64 card-premium border-none" placeholder="🔍 Buscar aluno...">
                            <button onclick="gerarFaturas()" id="btn-gerar-faturas" class="bg-indigo-600 text-white font-black py-3 px-6 rounded-xl text-xs uppercase tracking-widest shadow-lg transition-all">⚡ Gerar Faturas</button>
                        </div>
                        <div class="card-premium overflow-hidden">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50 border-b border-slate-100 text-[10px] font-black uppercase text-slate-400">
                                        <th class="px-6 py-4">Aluno</th>
                                        <th class="px-6 py-4 text-center">Vencimento</th>
                                        <th class="px-6 py-4 text-center">Bolsa</th>
                                        <th class="px-6 py-4 text-center">Status</th>
                                        <th class="px-6 py-4 text-right">Valor</th>
                                    </tr>
                                </thead>
                                <tbody id="tabela-mensalidades" class="divide-y divide-slate-50"></tbody>
                            </table>
                        </div>
                    </div>

                    <div id="tab-config-asaas" class="aba-content hidden flex flex-col gap-8">
                        <div id="asaas-ativo-panel" class="hidden space-y-6">
                            <div class="card-premium p-8 bg-slate-900 text-white relative overflow-hidden">
                                <p class="text-blue-400 text-[10px] font-black uppercase mb-4">Saldo Disponível</p>
                                <h3 class="text-5xl font-black tracking-tighter mb-4" id="asaas-saldo-display">R$ 0,00</h3>
                                <button onclick="carregarSaldoAsaas()" class="text-[10px] font-black uppercase bg-white/10 px-4 py-2 rounded-lg border border-white/10 transition-all hover:bg-white/20">🔄 Atualizar</button>
                                <div class="mt-6 pt-6 border-t border-white/10"><p class="text-[9px] text-slate-500 uppercase">Wallet ID</p><p class="font-mono text-xs text-slate-400" id="asaas-wallet-display">---</p></div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="card-premium p-8">
                                    <h4 class="font-black text-slate-800 uppercase text-xs mb-6">⚙️ Métodos Aceitos</h4>
                                    <div class="space-y-4">
                                        <label class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-blue-100 opacity-80 cursor-not-allowed">
                                            <span class="text-xs font-black text-slate-700">⚡ PIX (Obrigatório)</span>
                                            <input type="checkbox" checked disabled class="w-5 h-5 text-blue-600 border-none rounded">
                                        </label>
                                        <label class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all">
                                            <span class="text-xs font-bold text-slate-700">🏦 Boleto Bancário</span>
                                            <input type="checkbox" id="asaas-aceita-boleto" class="w-5 h-5 text-blue-600 border-slate-300 rounded">
                                        </label>
                                    </div>
                                    <button onclick="salvarConfigPagamento()" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-md">Salvar Preferências</button>
                                </div>
                                <div class="card-premium p-8 flex flex-col justify-center text-center">
                                    <h4 class="font-black text-slate-800 uppercase text-xs mb-4">🛡️ Identidade</h4>
                                    <p class="text-xs text-slate-500 mb-6">Envie as fotos para liberar saques.</p>
                                    <div class="grid grid-cols-3 gap-2 mb-6">
                                        <label class="h-16 bg-slate-50 rounded-xl flex items-center justify-center cursor-pointer border-2 border-dashed border-slate-200"><input type="file" class="hidden" onchange="previewFile(this, 'p1')"><span id="p1">📇</span></label>
                                        <label class="h-16 bg-slate-50 rounded-xl flex items-center justify-center cursor-pointer border-2 border-dashed border-slate-200"><input type="file" class="hidden" onchange="previewFile(this, 'p2')"><span id="p2">📑</span></label>
                                        <label class="h-16 bg-slate-50 rounded-xl flex items-center justify-center cursor-pointer border-2 border-dashed border-slate-200"><input type="file" class="hidden" onchange="previewFile(this, 'p3')"><span id="p3">🤳</span></label>
                                    </div>
                                    <button onclick="enviarDocumentosAsaas()" class="w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase">Enviar Documentos</button>
                                </div>
                            </div>
                        </div>

                        <form id="asaas-form-panel" class="card-premium p-8 space-y-6" onsubmit="event.preventDefault(); criarSubcontaAsaas();">
                            <h4 class="text-lg font-black text-slate-800">Ativação Financeira</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="md:col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase">Nome</label><input type="text" id="asaas-nome" required class="w-full p-3 bg-slate-50"></div>
                                <div><label class="text-[10px] font-black text-slate-400 uppercase">CPF/CNPJ</label><input type="text" id="asaas-cpf" required class="w-full p-3 bg-slate-50"></div>
                                <div><label class="text-[10px] font-black text-slate-400 uppercase">E-mail</label><input type="email" id="asaas-email" required class="w-full p-3 bg-slate-50"></div>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-xs shadow-lg">🚀 Ativar Agora</button>
                        </form>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <div id="modal-acoes-wrapper" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 transition-opacity">
        <div id="painel-acoes-mensalidade" class="bg-white p-8 card-premium shadow-2xl w-full max-w-md relative">
            <button onclick="fecharModalAcoes()" class="absolute top-4 right-4 text-slate-300 hover:text-rose-500 text-2xl">&times;</button>
            <h3 class="font-black text-slate-800 text-2xl mb-1" id="acao-aluno-nome">Selecione</h3>
            <p class="text-[10px] font-black text-rose-500 uppercase mb-6" id="acao-alerta-divida"></p>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="gerarReciboPDF()" class="bg-slate-100 py-4 rounded-2xl text-xs font-bold flex items-center justify-center gap-2">📄 Recibo</button>
                <button onclick="enviarWhatsApp()" class="bg-[#25D366] text-white py-4 rounded-2xl text-xs font-bold flex items-center justify-center gap-2">💬 WhatsApp</button>
            </div>
            <div class="space-y-4 pt-4 border-t border-slate-100">
                <div class="flex gap-2">
                    <input type="date" id="acao-data-pag" class="w-full p-3 bg-slate-50 text-sm font-bold border-none rounded-xl">
                    <select id="acao-forma-pag" class="w-full p-3 bg-slate-50 text-sm font-bold border-none rounded-xl">
                        <option value="PIX">PIX manual</option><option value="Dinheiro">Dinheiro</option><option value="PIX_ASAAS">Automático</option>
                    </select>
                </div>
                <button onclick="registrarPagamento()" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs">✅ Confirmar Recebimento</button>
                <button id="btn-gerar-asaas" onclick="gerarLinkAsaasAdmin()" class="hidden w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs">💳 Gerar Link Digital</button>
            </div>
        </div>
    </div>

    <script src="menu.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app);

        let uid = null;
        let equipeDados = null;
        let alunosCache = [];
        let financeiroMesCache = [];
        let alunoSelecionadoMens = null;

        // PREVIEW KYC
        window.previewFile = function(input, previewId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-xl">`;
                }
                reader.readAsDataURL(file);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uid = user.uid;
                await carregarInfoEquipe(user);
                carregarDados();
            } else window.location.href = "index.html";
        });

        async function carregarInfoEquipe(user) {
            const docSnap = await getDoc(doc(db, "equipes", uid));
            if (docSnap.exists()) {
                equipeDados = docSnap.data();
                if (equipeDados.status_asaas === 'ATIVO') {
                    document.getElementById('asaas-ativo-panel').classList.remove('hidden');
                    document.getElementById('asaas-config-grid')?.classList.remove('hidden');
                    document.getElementById('asaas-form-panel').classList.add('hidden');
                    document.getElementById('asaas-wallet-display').innerText = equipeDados.asaas_wallet_id || "---";
                    carregarSaldoAsaas();
                }
            }
        }

        window.carregarDados = async function() {
            const mes = document.getElementById('filtro-mes').value;
            const ano = document.getElementById('filtro-ano').value;
            const mesAno = `${ano}-${mes}`;

            const qAlunos = query(collection(db, "alunos"), where("equipe_id", "==", uid), where("status", "==", "ATIVO"));
            const snapAlunos = await getDocs(qAlunos);
            alunosCache = snapAlunos.docs.map(d => ({ id: d.id, ...d.data() }));

            const qFin = query(collection(db, "financeiro"), where("equipe_id", "==", uid), where("mes_ano", "==", mesAno));
            const snapFin = await getDocs(qFin);
            financeiroMesCache = snapFin.docs.map(d => ({ id: d.id, ...d.data() }));

            renderizarTabelas();
        }

        window.renderizarTabelas = function() {
            const cont = document.getElementById('tabela-mensalidades');
            cont.innerHTML = '';
            let tPago = 0, tPend = 0;

            financeiroMesCache.filter(f => f.tipo === 'MENSALIDADE').forEach(f => {
                const aluno = alunosCache.find(a => a.id === f.aluno_id);
                if (!aluno) return;
                const tr = document.createElement('tr');
                tr.className = "cursor-pointer hover:bg-slate-50 transition-colors";
                tr.onclick = () => abrirModalAcoes(aluno.id, { fatura_id: f.id, status: f.status, valor: f.valor, reg: f });
                tr.innerHTML = `<td class="px-6 py-5 font-bold text-slate-800 text-sm">${aluno.nome}</td>
                                <td class="px-6 py-5 text-center text-xs font-bold text-slate-400">Dia ${aluno.dia_vencimento || 10}</td>
                                <td class="px-6 py-5 text-center text-blue-500 font-black text-xs">Sim</td>
                                <td class="px-6 py-5 text-center"><span class="px-3 py-1 rounded-full text-[9px] font-black ${f.status === 'PAGO' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">${f.status || 'PENDENTE'}</span></td>
                                <td class="px-6 py-5 text-right font-black text-slate-800">R$ ${f.valor.toFixed(2).replace('.',',')}</td>`;
                cont.appendChild(tr);
                if(f.status === 'PAGO') tPago += f.valor; else tPend += f.valor;
            });
            document.getElementById('lbl-resumo-pago').innerText = `R$ ${tPago.toFixed(2).replace('.',',')}`;
            document.getElementById('lbl-resumo-pendente').innerText = `R$ ${tPend.toFixed(2).replace('.',',')}`;
        }

        window.mudarAba = (id) => {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.add('hidden'));
            document.getElementById(id).classList.replace('hidden', 'flex');
            document.querySelectorAll('.aba-item').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + id).classList.add('tab-active');
        }

        window.abrirModalAcoes = (alId, data) => {
            const aluno = alunosCache.find(a => a.id === alId);
            alunoSelecionadoMens = { ...aluno, _calc: data };
            document.getElementById('acao-aluno-nome').innerText = aluno.nome;
            document.getElementById('modal-acoes-wrapper').classList.replace('hidden', 'flex');
            const btnAsaas = document.getElementById('btn-gerar-asaas');
            if(equipeDados?.status_asaas === 'ATIVO' && data.status !== 'PAGO') btnAsaas.classList.remove('hidden');
            else btnAsaas.classList.add('hidden');
        };
        window.fecharModalAcoes = () => document.getElementById('modal-acoes-wrapper').classList.replace('flex', 'hidden');

        window.mascaraMoeda = (i) => { let v = i.value.replace(/\D/g,''); v = (v/100).toFixed(2).replace('.',','); i.value = v; };

    </script>
</body>
</html>
