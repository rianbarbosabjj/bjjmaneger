<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema | BJJ Manager</title>
    
    <link rel="icon" type="image/png" href="logo_bjj_maneger.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-pattern { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden selection:bg-cyan-500 selection:text-white">

    <div class="absolute inset-0 bg-pattern opacity-30"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl h-64 bg-cyan-500/20 blur-[120px] rounded-full pointer-events-none"></div>

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl border border-slate-700 p-8 rounded-3xl shadow-2xl relative z-10">
        
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block transition-transform hover:scale-105 mb-4">
                <img src="logo_bjj_maneger.png" alt="Logo" class="h-24 w-auto mx-auto filter drop-shadow-[0_0_15px_rgba(6,182,212,0.4)]">
            </a>
            <h2 class="text-2xl font-black text-white uppercase tracking-wider">Acesso ao Sistema</h2>
            <p class="text-[10px] text-cyan-500 mt-1 uppercase font-black tracking-[0.2em]">Gestão de Equipes</p>
        </div>

        <form id="form-login" class="space-y-5" onsubmit="event.preventDefault(); fazerLogin();">
            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">E-mail</label>
                <input type="email" id="login-email" required class="w-full px-5 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all placeholder:text-slate-600" placeholder="seu@email.com.br">
            </div>
            
            <div class="space-y-1.5">
                <div class="flex justify-between items-center ml-2 mr-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Senha</label>
                    <button type="button" onclick="recuperarSenha()" class="text-[10px] font-bold text-cyan-400 hover:text-cyan-300 hover:underline transition-colors">Esqueci a senha</button>
                </div>
                <div class="relative">
                    <input type="password" id="login-senha" required class="w-full px-5 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all pr-12 placeholder:text-slate-600" placeholder="••••••••">
                    <button type="button" onclick="toggleSenha('login-senha', this)" class="absolute inset-y-0 right-4 flex items-center text-slate-400 hover:text-cyan-400 transition-colors outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" id="btn-login" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-2xl transition-all shadow-[0_0_15px_rgba(6,182,212,0.3)] uppercase tracking-widest text-xs transform hover:-translate-y-0.5">
                Entrar
            </button>

            <div class="relative flex items-center justify-center mt-6 mb-4">
                <div class="border-t border-slate-700 w-full"></div>
                <span class="bg-slate-800 px-3 text-[9px] font-black text-slate-500 uppercase tracking-widest absolute">Ou</span>
            </div>

            <button type="button" onclick="loginComGoogle()" id="btn-google" class="w-full bg-white hover:bg-slate-100 text-slate-800 font-black py-3.5 rounded-2xl transition-all shadow-sm flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Entrar com Google
            </button>

            <div class="pt-6 text-center mt-2">
                <p class="text-[11px] text-slate-400">
                    Nova academia? <a href="cadastro_equipe.html" class="text-cyan-400 font-bold ml-1 hover:underline transition-colors">Cadastrar Agora</a>
                </p>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; 

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showToast = function(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : (type === 'error' ? 'bg-rose-500' : 'bg-slate-800');
            const icon = type === 'success' ? '✅' : (type === 'error' ? '🚨' : 'ℹ️');
            toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-full opacity-0 flex items-center gap-3 font-bold text-sm z-50 pointer-events-auto max-w-sm`;
            toast.innerHTML = `<span class="text-xl">${icon}</span> <span class="flex-1">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4500);
        }

        window.toggleSenha = function(inputId, btnElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btnElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>`;
            } else {
                input.type = "password";
                btnElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>`;
            }
        }

        window.fazerLogin = async function() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            const btn = document.getElementById('btn-login');
            
            if(!email || !senha) return showToast("Preencha todos os campos.");
            
            btn.disabled = true; 
            btn.innerText = "Entrando...";
            
            try {
                const uc = await signInWithEmailAndPassword(auth, email, senha);
                if (!uc.user.emailVerified) {
                    await signOut(auth);
                    showToast("E-mail não verificado. Cheque sua caixa de entrada.");
                    btn.disabled = false; btn.innerText = "Entrar";
                    return;
                }
                window.location.href = "dashboard.html";
            } catch (e) {
                showToast("E-mail ou senha incorretos.");
                btn.disabled = false; btn.innerText = "Entrar";
            }
        }

        window.loginComGoogle = async function() {
            const btn = document.getElementById('btn-google');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="text-slate-500 font-bold">Conectando...</span>`;

            try {
                const googleProvider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                const mestreDoc = await getDoc(doc(db, "equipes", user.uid));
                const colabDoc = await getDoc(doc(db, "colaboradores", user.uid));

                if (!mestreDoc.exists() && !colabDoc.exists()) {
                    await setDoc(doc(db, "equipes", user.uid), {
                        nome_equipe: user.displayName || "Nova Equipe",
                        email_responsavel: user.email,
                        url_logo: user.photoURL || "",
                        data_cadastro: new Date().toISOString(),
                        status_plano: 'TESTE',
                        valor_prazo: 100.0, 
                        valor_atraso: 120.0
                    });
                }

                window.location.href = "dashboard.html";
            } catch (error) {
                console.error(error);
                showToast("Erro ao conectar com o Google.", "error");
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        window.recuperarSenha = async function() {
            const email = document.getElementById('login-email').value;
            if(!email) return showToast("Digite seu e-mail no campo acima primeiro.");
            try {
                await sendPasswordResetEmail(auth, email);
                showToast("E-mail de recuperação enviado!", "success");
            } catch (e) {
                showToast("Erro ao enviar e-mail. Verifique se ele está correto.", "error");
            }
        }
    </script>
</body>
</html>
