<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vitrine Virtual | BJJ Manager</title>
    
    <link rel="icon" type="image/png" href="logo_bjj_maneger.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animação suave para as miniaturas */
        .miniatura-img { transition: transform 0.3s ease; }
        .miniatura-hover:hover .miniatura-img { transform: scale(1.05); }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden text-slate-800 bg-[#F8FAFC]">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div id="interface-sistema" class="flex w-full h-full relative overflow-hidden">
        
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-6 pb-0 max-w-7xl mx-auto w-full shrink-0 gap-4">
                <div>
                    <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Vitrine da Equipe</h2>
                    <p class="text-xs text-slate-500 font-medium mt-1">Gerencie os produtos que os alunos podem encomendar</p>
                </div>
                
                <div class="flex items-center gap-2 bg-white border border-slate-200 p-2 rounded-2xl shadow-sm w-full sm:w-auto">
                    <span class="text-emerald-500 text-xl pl-2">💬</span>
                    <div class="flex flex-col flex-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none px-2">WhatsApp da Loja</label>
                        <input type="text" id="config-whatsapp-loja" placeholder="(00) 00000-0000" oninput="mascaraTelefone(this)" class="bg-transparent border-none text-slate-700 text-xs font-bold outline-none px-2 py-1 placeholder:font-normal">
                    </div>
                    <button onclick="salvarWhatsappLoja()" id="btn-salvar-zap" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors shadow-sm shrink-0">
                        Salvar
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-hidden p-4 md:p-6 flex flex-col md:flex-row gap-6 max-w-7xl mx-auto w-full h-full">
                
                <div class="w-full md:w-1/3 flex flex-col h-full gap-4 shrink-0 overflow-y-auto hide-scrollbar">
                    
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 md:p-6 shrink-0 relative overflow-hidden">
                        <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-3 relative z-10">
                            <div class="flex items-center gap-2">
                                <span class="text-xl drop-shadow-sm">🛒</span>
                                <h3 class="font-black text-slate-800 uppercase tracking-widest text-sm" id="titulo-form">Novo Produto</h3>
                            </div>
                        </div>
                        
                        <div class="space-y-4 relative z-10">
                            
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Imagens do Produto</label>
                                
                                <div class="flex gap-2 overflow-x-auto hide-scrollbar py-1" id="container-miniaturas">
                                    <label class="shrink-0 w-20 h-20 rounded-2xl border-2 border-dashed border-cyan-300 bg-cyan-50 hover:bg-cyan-100 transition-colors flex flex-col items-center justify-center cursor-pointer group shadow-sm">
                                        <span class="text-xl text-cyan-500 group-hover:scale-110 transition-transform">➕</span>
                                        <span class="text-[8px] font-black text-cyan-600 uppercase mt-1">Fotos</span>
                                        <input type="file" id="produto-foto" accept="image/*" multiple class="hidden" onchange="processarNovasImagens(this)">
                                    </label>
                                </div>
                                <p class="text-[9px] text-slate-400 mt-1">Selecione até 5 imagens (Máx 5MB por foto).</p>
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Nome do Produto</label>
                                <input type="text" id="produto-nome" placeholder="Ex: Rash Guard, Kimono..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-cyan-500 transition-all font-bold text-slate-700">
                            </div>
                            
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Preço de Venda (R$)</label>
                                <input type="number" id="produto-valor" step="0.01" placeholder="Ex: 150.00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 transition-all text-emerald-700 font-black">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Status do Produto</label>
                                <select id="produto-status" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 focus:border-cyan-500 outline-none transition-all cursor-pointer">
                                    <option value="ATIVO">🟢 Disponível na vitrine</option>
                                    <option value="INATIVO">🔴 Oculto / Esgotado</option>
                                </select>
                            </div>
                            
                            <div class="flex gap-2 mt-4 pt-2 border-t border-slate-100">
                                <button onclick="cancelarEdicaoProduto()" id="btn-cancelar-produto" class="hidden flex-1 bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold py-3 px-3 rounded-xl transition-all text-xs uppercase tracking-widest">Cancelar</button>
                                <button onclick="salvarProduto()" id="btn-salvar-produto" class="flex-[2] bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3 px-3 rounded-xl shadow-lg shadow-emerald-500/30 transition-transform transform hover:-translate-y-0.5 uppercase tracking-widest text-xs">💾 Salvar Produto</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-2/3 flex flex-col h-full bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 md:p-5 border-b border-slate-100 bg-slate-50 flex items-center justify-between shrink-0">
                        <h3 class="font-black text-slate-800 text-xs uppercase tracking-widest">Sua Vitrine Virtual</h3>
                        <span class="text-[10px] bg-slate-200 text-slate-500 px-2 py-1 rounded-md font-bold uppercase tracking-widest">O que os alunos veem</span>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto p-4 md:p-6 hide-scrollbar bg-slate-50/50">
                        <div id="lista-produtos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                            <div class="col-span-full text-center text-slate-400 text-sm mt-10 italic">Carregando vitrine...</div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="menu.js"></script>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let uid = null;
        let teamId = null; 
        let produtosCache = [];
        let produtoEditandoId = null;

        // Variaveis para o controle de múltiplas imagens
        let imagensUrlsExistentes = []; 
        let novosArquivosImagem = []; 

        window.showToast = function(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-rose-500';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 transform translate-x-0 font-bold text-sm z-50 pointer-events-auto`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        window.mascaraTelefone = (i) => { 
            let v = i.value.replace(/\D/g, ""); 
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2"); 
            v = v.replace(/(\d)(\d{4})$/, "$1-$2"); 
            i.value = v; 
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const limparAcessando = () => {
                    const aside = document.querySelector('aside');
                    if (aside) {
                        const elementos = aside.querySelectorAll('p, span, h4');
                        elementos.forEach(el => {
                            if (el.innerText.includes('carregando') || el.innerText.includes('rianbarbosa')) el.innerText = user.email;
                            if (el.innerText.includes('ACESSANDO')) {
                                el.innerText = 'ADMINISTRADOR';
                                el.classList.remove('animate-pulse');
                                el.style.opacity = "1";
                            }
                        });
                    }
                };
                limparAcessando(); setTimeout(limparAcessando, 600);

                let equipeDados = null;

                const mestreDoc = await getDoc(doc(db, "equipes", user.uid));
                if (mestreDoc.exists()) { 
                    teamId = user.uid; 
                    equipeDados = mestreDoc.data();
                    if(equipeDados.whatsapp_loja) document.getElementById('config-whatsapp-loja').value = equipeDados.whatsapp_loja;
                } 
                else {
                    const colabDoc = await getDoc(doc(db, "colaboradores", user.uid));
                    if (colabDoc.exists()) {
                        teamId = colabDoc.data().equipe_id;
                        const eqDoc = await getDoc(doc(db, "equipes", teamId));
                        if(eqDoc.exists()) {
                            equipeDados = eqDoc.data();
                            if(equipeDados.whatsapp_loja) document.getElementById('config-whatsapp-loja').value = equipeDados.whatsapp_loja;
                        }
                    }
                }

                // ATUALIZA A LOGO E O NOME NO MENU LATERAL
                if (equipeDados) {
                    const nomeEquipe = equipeDados.nome_equipe || equipeDados.nome || "Sua Equipe";
                    const logoEquipe = equipeDados.url_logo || "";

                    const elNome = document.getElementById('nome-equipe');
                    if(elNome) elNome.innerText = nomeEquipe.toUpperCase();

                    const elLogo = document.getElementById('container-logo');
                    if(elLogo) {
                        if(logoEquipe) {
                            elLogo.style.background = 'transparent';
                            elLogo.innerHTML = `<img src="${logoEquipe}" class="w-full h-full object-cover" alt="Logo">`;
                        } else {
                            elLogo.style.background = '';
                            elLogo.innerHTML = nomeEquipe.charAt(0).toUpperCase();
                        }
                    }
                    
                    // Salva na sessão para manter a transição rápida entre as telas
                    sessionStorage.setItem('bjj_equipe_nome', nomeEquipe);
                    sessionStorage.setItem('bjj_equipe_logo', logoEquipe);
                }

                if (teamId) {
                    uid = teamId;
                    await carregarProdutos();
                }
            } else { window.location.href = "index.html"; }
        });

        // --- SALVAR WHATSAPP DA LOJA ---
        window.salvarWhatsappLoja = async function() {
            const zap = document.getElementById('config-whatsapp-loja').value;
            const btn = document.getElementById('btn-salvar-zap');
            const origTxt = btn.innerHTML;
            
            btn.innerHTML = "⏳"; btn.disabled = true;
            try {
                await updateDoc(doc(db, "equipes", uid), { whatsapp_loja: zap });
                showToast("WhatsApp da loja atualizado!", "success");
            } catch (error) {
                showToast("Erro ao salvar número.", "error");
            } finally {
                btn.innerHTML = origTxt; btn.disabled = false;
            }
        }

        // --- SISTEMA DE MÚLTIPLAS IMAGENS ---
        window.processarNovasImagens = function(input) {
            if (input.files && input.files.length > 0) {
                for(let i = 0; i < input.files.length; i++) {
                    if (imagensUrlsExistentes.length + novosArquivosImagem.length >= 5) {
                        showToast("Máximo de 5 fotos por produto.", "error");
                        break;
                    }
                    novosArquivosImagem.push(input.files[i]);
                }
                atualizarContainerMiniaturas();
            }
            input.value = ""; 
        };

        window.removerImagemExistente = function(index) {
            imagensUrlsExistentes.splice(index, 1);
            atualizarContainerMiniaturas();
        };

        window.removerNovoArquivo = function(index) {
            novosArquivosImagem.splice(index, 1);
            atualizarContainerMiniaturas();
        };

        function atualizarContainerMiniaturas() {
            const container = document.getElementById('container-miniaturas');
            const btnAdd = container.firstElementChild; 
            
            container.innerHTML = '';
            container.appendChild(btnAdd);

            imagensUrlsExistentes.forEach((url, index) => {
                const div = criarMiniatura(url, () => removerImagemExistente(index));
                container.appendChild(div);
            });

            novosArquivosImagem.forEach((file, index) => {
                const objectUrl = URL.createObjectURL(file);
                const div = criarMiniatura(objectUrl, () => removerNovoArquivo(index));
                container.appendChild(div);
            });
        }

        function criarMiniatura(src, funcRemover) {
            const div = document.createElement('div');
            div.className = "shrink-0 w-20 h-20 rounded-2xl border border-slate-200 bg-white relative overflow-hidden group shadow-sm miniatura-hover";
            div.innerHTML = `
                <img src="${src}" class="w-full h-full object-cover miniatura-img">
                <div class="absolute inset-0 bg-slate-900/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <button type="button" class="text-white bg-rose-500 hover:bg-rose-600 rounded-full w-8 h-8 flex items-center justify-center shadow-lg font-bold" title="Remover foto">🗑️</button>
                </div>
            `;
            div.querySelector('button').onclick = funcRemover;
            return div;
        }

        // --- CARREGAMENTO DOS PRODUTOS DA LOJA ---
        async function carregarProdutos() {
            const container = document.getElementById('lista-produtos');
            try {
                const q = query(collection(db, "produtos"), where("equipe_id", "==", uid));
                const snap = await getDocs(q);
                produtosCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.nome.localeCompare(b.nome));
                renderizarProdutos();
            } catch (error) {
                container.innerHTML = "<div class='col-span-full text-center p-6 text-rose-500 text-xs italic bg-rose-50 rounded-xl'>Erro ao carregar a vitrine virtual..</div>";
            }
        }

        window.scrollCarrossel = function(idCarrossel, direcao) {
            const el = document.getElementById(idCarrossel);
            if(el) {
                const scrollAmount = el.clientWidth;
                el.scrollBy({ left: direcao * scrollAmount, behavior: 'smooth' });
            }
        }

        function renderizarProdutos() {
            const container = document.getElementById('lista-produtos');
            container.innerHTML = produtosCache.length === 0 ? "<div class='col-span-full text-center p-10 text-slate-400 text-sm'>Nenhum produto cadastrado na vitrine virtual.</div>" : "";
            
            produtosCache.forEach((p) => {
                const precoFormatado = p.valor ? parseFloat(p.valor).toFixed(2).replace('.', ',') : "0,00";
                
                let arrayDeImagens = [];
                if (p.imagens_urls && p.imagens_urls.length > 0) arrayDeImagens = p.imagens_urls;
                else if (p.imagem_url) arrayDeImagens = [p.imagem_url];
                else arrayDeImagens = ['https://via.placeholder.com/400x400?text=Sem+Foto'];

                const bgStatus = p.status === 'ATIVO' ? 'bg-white' : 'bg-slate-100 grayscale-[50%] opacity-70';
                const badgeStatus = p.status === 'ATIVO' 
                    ? '<span class="absolute top-3 left-3 z-20 bg-emerald-500 text-white text-[8px] font-black px-2.5 py-1 rounded-md uppercase tracking-widest shadow-md">Na vitrine</span>'
                    : '<span class="absolute top-3 left-3 z-20 bg-slate-500 text-white text-[8px] font-black px-2.5 py-1 rounded-md uppercase tracking-widest shadow-md">Oculto</span>';

                let idUnicoCarrossel = `carousel-${p.id}`;
                
                let slidesHtml = '';
                arrayDeImagens.forEach(img => {
                    slidesHtml += `<div class="w-full h-full shrink-0 flex items-center justify-center snap-center relative overflow-hidden"><img src="${img}" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500"></div>`;
                });

                let setasHtml = '';
                if (arrayDeImagens.length > 1) {
                    setasHtml = `
                        <button onclick="scrollCarrossel('${idUnicoCarrossel}', -1)" class="absolute left-1 top-1/2 -translate-y-1/2 w-7 h-7 bg-white/80 hover:bg-white rounded-full flex items-center justify-center text-xs shadow-md z-10 opacity-0 group-hover:opacity-100 transition-opacity">◀</button>
                        <button onclick="scrollCarrossel('${idUnicoCarrossel}', 1)" class="absolute right-1 top-1/2 -translate-y-1/2 w-7 h-7 bg-white/80 hover:bg-white rounded-full flex items-center justify-center text-xs shadow-md z-10 opacity-0 group-hover:opacity-100 transition-opacity">▶</button>
                        <div class="absolute bottom-2 left-0 w-full flex justify-center gap-1 z-10">
                            ${arrayDeImagens.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full bg-slate-400/50 ${i===0?'!bg-cyan-500 w-3':''}"></div>`).join('')}
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = `flex flex-col border border-slate-200 rounded-3xl overflow-hidden shadow-sm group hover:shadow-xl transition-all duration-300 hover:-translate-y-1 ${bgStatus} relative`;
                
                card.innerHTML = `
                    ${badgeStatus}
                    <div class="aspect-square bg-slate-50 relative border-b border-slate-100">
                        ${setasHtml}
                        <div id="${idUnicoCarrossel}" class="w-full h-full flex overflow-x-auto snap-x snap-mandatory hide-scrollbar scroll-smooth">
                            ${slidesHtml}
                        </div>
                    </div>
                    <div class="p-4 flex flex-col flex-1">
                        <h4 class="text-xs font-black text-slate-800 uppercase tracking-wide truncate mb-1" title="${p.nome}">${p.nome}</h4>
                        <p class="text-base font-black text-emerald-600 mb-4">R$ ${precoFormatado}</p>
                        
                        <div class="mt-auto grid grid-cols-2 gap-2">
                            <button onclick="editarProduto('${p.id}')" class="bg-slate-100 hover:bg-cyan-50 text-slate-500 hover:text-cyan-600 border border-slate-200 hover:border-cyan-200 rounded-xl py-2.5 text-[9px] font-black uppercase tracking-widest transition-colors shadow-sm">Editar</button>
                            <button onclick="excluirProduto('${p.id}')" class="bg-slate-100 hover:bg-rose-50 text-slate-500 hover:text-rose-600 border border-slate-200 hover:border-rose-200 rounded-xl py-2.5 text-[9px] font-black uppercase tracking-widest transition-colors shadow-sm">Excluir</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.salvarProduto = async function() {
            const nome = document.getElementById('produto-nome').value.trim();
            const valor = parseFloat(document.getElementById('produto-valor').value);
            const status = document.getElementById('produto-status').value;

            if (!nome || isNaN(valor)) return showToast("Preencha o nome e o preço corretamente.", "error");
            if (imagensUrlsExistentes.length === 0 && novosArquivosImagem.length === 0) return showToast("Adicione pelo menos uma foto.", "error");
            
            const btn = document.getElementById('btn-salvar-produto');
            btn.disabled = true; btn.innerHTML = "⏳ Salvando...";

            try {
                let dados = { 
                    nome: nome, 
                    valor: valor, 
                    status: status 
                };

                let urlsGeradas = [];

                if (novosArquivosImagem.length > 0) {
                    btn.innerHTML = `⏳ Enviando ${novosArquivosImagem.length} fotos...`;
                    for (let file of novosArquivosImagem) {
                        const fotoRef = ref(storage, `loja_fotos/${uid}_${Date.now()}_${file.name}`);
                        await uploadBytes(fotoRef, file);
                        const url = await getDownloadURL(fotoRef);
                        urlsGeradas.push(url);
                    }
                }

                // A nova lista de URLs junta o que sobrou das antigas com as recém subidas.
                dados.imagens_urls = [...imagensUrlsExistentes, ...urlsGeradas];

                if (produtoEditandoId) {
                    const pAntigo = produtosCache.find(x => x.id === produtoEditandoId);
                    
                    // Compara e apaga do Storage as fotos antigas que o usuário removeu da UI
                    if (pAntigo && pAntigo.imagens_urls) {
                        const fotosRemovidas = pAntigo.imagens_urls.filter(urlAntiga => !imagensUrlsExistentes.includes(urlAntiga));
                        for (let urlRemover of fotosRemovidas) {
                            try { await deleteObject(ref(storage, urlRemover)); } catch(e) { console.error("Erro ao apagar foto velha", e); }
                        }
                    } else if (pAntigo && pAntigo.imagem_url && !imagensUrlsExistentes.includes(pAntigo.imagem_url)) {
                        // Compatibilidade com a versão antiga do banco que tinha apenas 'imagem_url'
                         try { await deleteObject(ref(storage, pAntigo.imagem_url)); } catch(e) {}
                    }

                    await updateDoc(doc(db, "produtos", produtoEditandoId), dados);
                    showToast("Produto atualizado com sucesso!", "success");
                } else {
                    await addDoc(collection(db, "produtos"), { ...dados, equipe_id: uid, data_criacao: new Date().toISOString() });
                    showToast("Produto adicionado à vitrine!", "success");
                }
                
                cancelarEdicaoProduto(); 
                carregarProdutos();
                
            } catch (e) { 
                showToast("Erro ao salvar o produto.", "error"); 
                console.error(e);
            } finally {
                btn.disabled = false; btn.innerHTML = "💾 Salvar Produto";
            }
        }

        window.editarProduto = function(id) {
            const p = produtosCache.find(x => x.id === id);
            if(!p) return;
            
            produtoEditandoId = id;
            
            if (p.imagens_urls && p.imagens_urls.length > 0) {
                imagensUrlsExistentes = [...p.imagens_urls];
            } else if (p.imagem_url) {
                imagensUrlsExistentes = [p.imagem_url]; 
            } else {
                imagensUrlsExistentes = [];
            }
            
            novosArquivosImagem = []; 
            atualizarContainerMiniaturas();

            document.getElementById('produto-nome').value = p.nome || "";
            document.getElementById('produto-valor').value = p.valor || "";
            document.getElementById('produto-status').value = p.status || "ATIVO";

            document.getElementById('titulo-form').innerText = "✏️ Editar Produto";
            document.getElementById('btn-cancelar-produto').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        window.excluirProduto = async function(id) {
            if(!confirm("Tem certeza que deseja excluir este produto da vitrine? Esta ação apagará todas as fotos associadas.")) return;
            try {
                const p = produtosCache.find(x => x.id === id);
                await deleteDoc(doc(db, "produtos", id));
                
                let imagensParaApagar = [];
                if (p.imagens_urls) imagensParaApagar = [...p.imagens_urls];
                else if (p.imagem_url) imagensParaApagar = [p.imagem_url];

                for (let imgUrl of imagensParaApagar) {
                    try {
                        const refImg = ref(storage, imgUrl);
                        await deleteObject(refImg);
                    } catch(e) {}
                }

                showToast("Produto excluído!", "success");
                if (produtoEditandoId === id) cancelarEdicaoProduto();
                carregarProdutos();
            } catch(e) {
                showToast("Erro ao excluir.", "error");
            }
        }

        window.cancelarEdicaoProduto = () => {
            produtoEditandoId = null;
            imagensUrlsExistentes = [];
            novosArquivosImagem = [];
            
            document.getElementById('produto-nome').value = "";
            document.getElementById('produto-valor').value = "";
            document.getElementById('produto-status').value = "ATIVO";
            document.getElementById('produto-foto').value = "";
            
            atualizarContainerMiniaturas();

            document.getElementById('titulo-form').innerHTML = "Novo Produto";
            document.getElementById('btn-cancelar-produto').classList.add('hidden');
        }

    </script>
</body>
</html>
