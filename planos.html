<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planos e Assinatura | BJJ Manager</title>
    
    <link rel="icon" type="image/png" href="logo_bjj_maneger.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden text-slate-800 bg-[#F8FAFC]">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div class="w-full bg-slate-900 p-3 text-center relative z-50 shrink-0 shadow-md flex items-center justify-center h-16">
        <a href="dashboard.html" class="absolute left-4 top-1/2 -translate-y-1/2 transition-opacity hover:opacity-80 flex items-center gap-2 text-white text-xs font-bold bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 shadow-sm">
            <span>←</span> Voltar
        </a>
        <img src="logo_bjj_maneger.png" class="h-8 md:h-10 filter drop-shadow-lg" alt="BJJ Manager">
    </div>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 hide-scrollbar">
        <div class="max-w-7xl mx-auto space-y-8 pb-12">
            
            <div class="text-center mt-4 mb-8">
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 uppercase tracking-tight mb-2">Escolha o seu plano</h2>
                <p class="text-slate-500 font-medium text-sm">Upgrade imediato para o seu tatame digital.</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8 items-start">
                
                <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm flex flex-col relative opacity-90 h-full">
                    <h3 id="plano1-nome" class="text-xl font-black text-slate-800 mb-2">Carregando...</h3>
                    <p id="plano1-desc" class="text-xs text-slate-500 mb-6 min-h-[40px]">...</p>
                    
                    <div class="mb-6 border-b border-slate-100 pb-6 flex flex-col h-[70px] justify-end">
                        <div>
                            <span class="text-sm text-slate-800 font-bold mb-1">R$</span>
                            <span id="plano1-preco" class="text-4xl font-black text-slate-800">0,00</span>
                            <span class="text-slate-400 text-sm font-bold"> / mês</span>
                        </div>
                    </div>
                    
                    <ul id="plano1-features" class="space-y-4 mb-8 flex-1 text-sm"></ul>
                    
                    <button disabled class="w-full bg-slate-50 text-slate-400 font-black py-4 rounded-xl text-[10px] uppercase border border-slate-200 cursor-not-allowed mt-auto">
                        Plano Base
                    </button>
                </div>

                <div class="bg-gradient-to-b from-slate-800 to-slate-900 rounded-3xl p-8 border-2 border-cyan-500 flex flex-col relative shadow-[0_0_30px_rgba(6,182,212,0.15)] transform lg:scale-105 z-10 h-full">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-cyan-500 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Mais Escolhido</div>
                    
                    <h3 id="plano2-nome" class="text-xl font-black text-cyan-400 mb-2 mt-2">Carregando...</h3>
                    <p id="plano2-desc" class="text-xs text-slate-300 mb-6 min-h-[40px]">...</p>
                    
                    <div class="mb-6 flex flex-col border-b border-slate-700 pb-6 h-[70px] justify-end">
                        <div id="plano2-preco-antigo-container" class="hidden">
                            <span id="plano2-preco-antigo" class="text-sm text-slate-500 line-through font-bold"></span>
                        </div>
                        <div class="flex items-end gap-1">
                            <span class="text-sm text-cyan-400 font-bold mb-1">R$</span>
                            <span id="plano2-preco" class="text-4xl font-black text-white leading-none">--,--</span>
                            <span class="text-slate-500 text-sm font-bold mb-1">/ mês</span>
                        </div>
                    </div>
                    
                    <ul id="plano2-features" class="space-y-4 mb-8 flex-1 text-sm"></ul>
                    
                    <button id="btn-plano2" onclick="iniciarCheckout('BLACK_BELT')" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-black py-4 rounded-xl text-center text-xs uppercase tracking-widest transition-all shadow-lg transform hover:-translate-y-0.5 mt-auto">
                        Assinar Agora
                    </button>
                </div>

                <div class="bg-white rounded-3xl p-8 border border-slate-200 flex flex-col relative shadow-sm opacity-95 h-full">
                    <h3 id="plano3-nome" class="text-xl font-black text-slate-800 mb-2">Carregando...</h3>
                    <p id="plano3-desc" class="text-xs text-slate-500 mb-6 min-h-[40px]">...</p>
                    
                    <div class="mb-6 flex flex-col border-b border-slate-100 pb-6 h-[70px] justify-end">
                        <div id="plano3-preco-antigo-container" class="hidden">
                            <span id="plano3-preco-antigo" class="text-sm text-slate-400 line-through font-bold"></span>
                        </div>
                        <div class="flex items-end gap-1">
                            <span class="text-sm text-amber-500 font-bold mb-1">R$</span>
                            <span id="plano3-preco" class="text-4xl font-black text-slate-800 leading-none">--,--</span>
                            <span class="text-slate-400 text-sm font-bold mb-1">/ mês</span>
                        </div>
                    </div>
                    
                    <ul id="plano3-features" class="space-y-4 mb-8 flex-1 text-sm"></ul>
                    
                    <button id="btn-plano3" onclick="iniciarCheckout('ELITE')" class="w-full bg-amber-500 hover:bg-amber-400 text-white font-black py-4 rounded-xl text-center text-xs uppercase tracking-widest transition-all shadow-lg transform hover:-translate-y-0.5 mt-auto">
                        Assinar Agora
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app);

        let equipeId = null;
        let equipePlanoAtual = null;

        window.showToast = function(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-rose-500';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl transition-all font-bold text-sm z-[9999]`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                equipeId = user.uid;
                
                // 1. Busca qual o plano que o professor tem ativo no momento
                const mestreDoc = await getDoc(doc(db, "equipes", user.uid));
                if (mestreDoc.exists()) {
                    equipePlanoAtual = mestreDoc.data().status_plano || 'TESTE';
                }
                
                // 2. Busca e constrói a tela baseada no Super Admin
                construirTelaDePlanos();
                
            } else {
                window.location.href = "login.html";
            }
        });

        // Função que converte o texto do banco de dados (✓ e ❌) numa lista visual bonita
        function renderizarListaFuncionalidades(containerId, featuresStr, corCheck, corTexto) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(!featuresStr) return;
            
            const linhas = featuresStr.split('\n');
            linhas.forEach(linha => {
                if(!linha.trim()) return;
                const li = document.createElement('li');
                li.className = "flex items-start gap-3";
                
                if (linha.startsWith('✓')) {
                    const txt = linha.replace('✓', '').trim();
                    li.innerHTML = `<span class="text-${corCheck}-500 font-black mt-0.5">✓</span> <span class="text-${corTexto} font-medium">${txt}</span>`;
                } else if (linha.startsWith('❌')) {
                    const txt = linha.replace('❌', '').trim();
                    li.innerHTML = `<span class="text-slate-400 font-bold mt-0.5">❌</span> <span class="text-slate-400 line-through opacity-70">${txt}</span>`;
                }
                container.appendChild(li);
            });
        }

        function formatarMoeda(valor) {
            return parseFloat(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function construirTelaDePlanos() {
            try {
                // Puxa os dados que você salvou lá no super_admin.html
                const docSnap = await getDoc(doc(db, "sistema", "config_planos"));
                
                if (docSnap.exists()) {
                    const planos = docSnap.data();

                    // ==========================================
                    // PREENCHER PLANO 1
                    // ==========================================
                    document.getElementById('plano1-nome').innerText = planos.p1.nome;
                    document.getElementById('plano1-desc').innerText = planos.p1.desc;
                    document.getElementById('plano1-preco').innerText = formatarMoeda(planos.p1.preco);
                    renderizarListaFuncionalidades('plano1-features', planos.p1.features, 'emerald', 'slate-600');

                    // ==========================================
                    // PREENCHER PLANO 2 (BLACK BELT)
                    // ==========================================
                    document.getElementById('plano2-nome').innerText = planos.p2.nome;
                    document.getElementById('plano2-desc').innerText = planos.p2.desc;
                    document.getElementById('plano2-preco').innerText = formatarMoeda(planos.p2.preco);
                    
                    if(planos.p2.preco_original && parseFloat(planos.p2.preco_original) > parseFloat(planos.p2.preco)) {
                        document.getElementById('plano2-preco-antigo-container').classList.remove('hidden');
                        document.getElementById('plano2-preco-antigo').innerText = `De R$ ${formatarMoeda(planos.p2.preco_original)}`;
                    }
                    
                    renderizarListaFuncionalidades('plano2-features', planos.p2.features, 'cyan', 'slate-200');

                    // ==========================================
                    // PREENCHER PLANO 3 (ELITE)
                    // ==========================================
                    document.getElementById('plano3-nome').innerText = planos.p3.nome;
                    document.getElementById('plano3-desc').innerText = planos.p3.desc;
                    document.getElementById('plano3-preco').innerText = formatarMoeda(planos.p3.preco);
                    
                    if(planos.p3.preco_original && parseFloat(planos.p3.preco_original) > parseFloat(planos.p3.preco)) {
                        document.getElementById('plano3-preco-antigo-container').classList.remove('hidden');
                        document.getElementById('plano3-preco-antigo').innerText = `De R$ ${formatarMoeda(planos.p3.preco_original)}`;
                    }

                    renderizarListaFuncionalidades('plano3-features', planos.p3.features, 'amber', 'slate-600');


                    // ==========================================
                    // BLOQUEAR BOTÃO SE O CLIENTE JÁ TEM O PLANO
                    // ==========================================
                    if(equipePlanoAtual === 'BLACK_BELT') {
                        const btn2 = document.getElementById('btn-plano2');
                        btn2.disabled = true;
                        btn2.innerHTML = "✓ SEU PLANO ATUAL";
                        btn2.className = "w-full bg-slate-800 text-slate-500 font-black py-4 rounded-xl text-xs cursor-not-allowed border border-slate-700 shadow-none mt-auto";
                    } 
                    else if (equipePlanoAtual === 'ELITE') {
                        const btn3 = document.getElementById('btn-plano3');
                        btn3.disabled = true;
                        btn3.innerHTML = "✓ SEU PLANO ATUAL";
                        btn3.className = "w-full bg-slate-200 text-slate-400 font-black py-4 rounded-xl text-xs cursor-not-allowed border border-slate-300 mt-auto";
                    }

                } else {
                    console.warn("Nenhum plano configurado no Super Admin ainda.");
                }
            } catch (error) {
                console.error("Erro ao puxar planos do banco:", error);
            }
        }

        // ==========================================
        // CHECKOUT: GERA O LINK DE PAGAMENTO
        // ==========================================
        window.iniciarCheckout = async function(planoEscolhido) {
            const btnId = planoEscolhido === 'ELITE' ? 'btn-plano3' : 'btn-plano2';
            const btn = document.getElementById(btnId);
            const originalTxt = btn.innerHTML;
            
            btn.innerHTML = "⏳ GERANDO LINK...";
            btn.disabled = true;

            try {
                // Puxa o valor do plano diretamente do banco de dados do Construtor para cobrar certo
                const docSnap = await getDoc(doc(db, "sistema", "config_planos"));
                let valorParaCobrar = 49.90; // Default
                
                if (docSnap.exists()) {
                    const planos = docSnap.data();
                    if(planoEscolhido === 'ELITE') valorParaCobrar = parseFloat(planos.p3.preco);
                    if(planoEscolhido === 'BLACK_BELT') valorParaCobrar = parseFloat(planos.p2.preco);
                }

                // Chama a Função do Asaas para gerar o PIX/Cartão
                const gerarAssinatura = httpsCallable(functions, 'gerarAssinaturaSistema');
                
                const resultado = await gerarAssinatura({
                    equipeId: equipeId,
                    nomePlano: planoEscolhido,
                    valor: valorParaCobrar,
                    email: auth.currentUser.email,
                    nome: "Assinante BJJ Manager"
                });

                if (resultado.data.success) {
                    showToast("Redirecionando para o Checkout Seguro...", "success");
                    setTimeout(() => {
                        window.open(resultado.data.url, '_blank');
                        btn.innerHTML = originalTxt;
                        btn.disabled = false;
                    }, 1500);
                } else {
                    throw new Error(resultado.data.error);
                }
            } catch (error) {
                console.error(error);
                showToast("Erro ao gerar link de pagamento.", "error");
                btn.innerHTML = originalTxt;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
