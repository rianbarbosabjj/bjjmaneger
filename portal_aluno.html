<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Atleta | BJJ Manager</title>
    
    <link rel="icon" type="image/png" href="logo_bjj_maneger.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        .custom-checkbox {
            appearance: none;
            background-color: #1e293b;
            width: 1.15em; height: 1.15em;
            border: 1px solid #334155;
            border-radius: 0.25em;
            display: grid;
            place-content: center;
        }
        .custom-checkbox:checked::before {
            content: ""; width: 0.65em; height: 0.65em;
            box-shadow: inset 1em 1em #06b6d4;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
    </style>
</head>
<body class="text-slate-200 overflow-x-hidden selection:bg-cyan-500 selection:text-white min-h-screen flex flex-col relative">

    <div class="fixed inset-0 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:20px_20px] opacity-20 pointer-events-none z-0"></div>
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div id="tela-login" class="relative z-10 flex-1 flex items-center justify-center p-4 min-h-screen">
        <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl border border-slate-700 p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <img src="logo_bjj_maneger.png" class="h-20 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                <h2 class="text-2xl font-black text-white uppercase tracking-wider">Portal do Atleta</h2>
            </div>
            <form onsubmit="event.preventDefault(); fazerLoginAluno();" class="space-y-5">
                <input type="email" id="login-email" required class="w-full px-5 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-cyan-500" placeholder="E-mail">
                <input type="password" id="login-senha" required class="w-full px-5 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-cyan-500" placeholder="Senha">
                <button type="submit" id="btn-login" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs transition-all shadow-lg">Entrar no Tatame</button>
            </form>
        </div>
    </div>

    <div id="tela-portal" class="hidden flex-col w-full flex-1 relative z-10 h-full">
        
        <div id="banner-anamnese" class="hidden bg-rose-600 text-white p-3 text-center text-xs font-bold flex-col sm:flex-row items-center justify-center gap-3 z-50">
            <span>⚠️ Ação Obrigatória: Preencha sua ficha de saúde.</span>
            <button onclick="abrirModalAnamnese()" class="bg-white text-rose-600 px-4 py-1 rounded-full font-black text-[10px] uppercase">Preencher Agora</button>
        </div>

        <header class="pt-8 pb-4 px-6 flex justify-between items-center max-w-3xl mx-auto w-full">
            <img id="logo-equipe-topo" src="logo_bjj_maneger.png" class="h-10 drop-shadow-lg">
            <button onclick="sairDoPortal()" class="text-[10px] font-black uppercase text-slate-400 bg-slate-800/50 px-3 py-1.5 rounded-lg border border-slate-700/50">Sair 🚪</button>
        </header>

        <main class="flex-1 max-w-3xl w-full mx-auto px-4 sm:px-6 pb-28 overflow-y-auto hide-scrollbar space-y-6">
            <div class="pt-2">
                <h1 class="text-3xl font-black text-white">Oss, <span id="nome-saudacao" class="text-cyan-400">Atleta</span>!</h1>
                <p id="subtitulo-secao" class="text-sm text-slate-400 mt-1 font-medium italic">Sua identificação oficial e acesso à equipe.</p>
            </div>

            <section id="aba-carteirinha" class="aluno-secao block space-y-4">
                <div id="cart-wrapper" class="w-full overflow-x-auto hide-scrollbar py-2 -mx-4 px-4 sm:px-0 flex justify-center">
                    <div id="carteirinha" class="relative bg-white rounded-2xl shadow-2xl border border-slate-200 flex text-slate-800 w-[600px] h-[380px] shrink-0 overflow-hidden" style="background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);">
                        <div class="flex-1 p-6 flex flex-col z-10 relative">
                            <div class="flex items-center gap-4 mb-6">
                                <div class="h-16 w-16 bg-white rounded-full flex items-center justify-center border border-slate-200 overflow-hidden">
                                    <img id="cart-equipe-logo" src="" class="h-full w-full object-contain p-1 hidden">
                                    <div id="cart-equipe-fallback" class="text-3xl font-black text-slate-700">E</div>
                                </div>
                                <h2 id="cart-equipe-nome" class="text-xl font-black uppercase text-slate-800 truncate max-w-[240px]">EQUIPE</h2>
                            </div>
                            <div class="grid grid-cols-2 gap-3 mt-auto mb-4">
                                <div class="col-span-2 bg-white/90 border-l-4 border-cyan-500 p-2 rounded shadow-sm">
                                    <p class="text-[8px] text-slate-400 uppercase font-bold">Nome do Atleta</p>
                                    <p id="cart-aluno-nome-txt" class="text-sm font-black uppercase truncate">--</p>
                                </div>
                                <div class="bg-white/90 border-l-4 border-slate-300 p-2 rounded shadow-sm relative overflow-hidden">
                                    <div id="cart-faixa-border" class="absolute left-0 top-0 w-1 h-full"></div>
                                    <p class="text-[8px] text-slate-400 uppercase font-bold pl-1">Graduação</p>
                                    <p id="cart-aluno-faixa-texto" class="text-[10px] font-black uppercase pl-1">--</p>
                                </div>
                                <div class="bg-white/90 border-l-4 border-slate-300 p-2 rounded shadow-sm">
                                    <p class="text-[8px] text-slate-400 uppercase font-bold">Matrícula</p>
                                    <p id="cart-aluno-matricula-txt" class="text-[10px] font-black uppercase">0000</p>
                                </div>
                            </div>
                        </div>
                        <div class="w-[35%] bg-slate-100/50 border-l border-slate-200 p-6 flex flex-col items-center justify-between z-10 backdrop-blur-sm">
                            <div class="w-full aspect-[3/4] bg-white rounded-lg border-2 border-white overflow-hidden shadow-md flex items-center justify-center">
                                <img id="cart-aluno-foto-modal" class="w-full h-full object-cover hidden">
                                <span id="cart-aluno-foto-fallback-modal" class="text-5xl font-black text-slate-300">?</span>
                            </div>
                            <div id="cart-qr-code" class="w-16 h-16 bg-white p-1 rounded shadow-inner"></div>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-3 max-w-[600px] mx-auto">
                    <button onclick="baixarCarteirinhaPNG()" class="flex-1 bg-emerald-600 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest">Baixar PNG</button>
                    <button onclick="baixarCarteirinhaPDF()" class="flex-1 bg-rose-600 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest">Baixar PDF</button>
                </div>
            </section>

            <section id="aba-curriculo" class="aluno-secao hidden space-y-6">
                <div id="card-faixa-destaque" class="bg-slate-800/80 border border-slate-700 p-5 rounded-3xl flex justify-between items-center shadow-lg">
                    <div class="flex items-center gap-4">
                        <div id="cor-faixa-atual-circulo" class="w-12 h-12 rounded-full border-2 border-slate-900 shadow-xl"></div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Tempo na Faixa</p>
                            <p id="txt-tempo-na-faixa" class="text-cyan-400 font-black text-sm">Calculando...</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Graduação Atual</p>
                        <p id="txt-faixa-atual" class="text-sm font-black text-white uppercase italic">--</p>
                    </div>
                </div>

                <div class="bg-slate-800/40 rounded-3xl border border-slate-700/50 p-6 backdrop-blur-sm">
                    <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-6 flex items-center gap-2"><span>🥋</span> Linha do Tempo</h3>
                    <div id="lista-graduacoes" class="relative border-l-2 border-slate-700 ml-3 space-y-8 pb-4"></div>
                </div>

                <div class="bg-slate-800/40 rounded-3xl border border-slate-700/50 p-6 backdrop-blur-sm">
                    <h3 class="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-6 flex items-center gap-2"><span>🏆</span> Conquistas</h3>
                    <div id="lista-competicoes" class="space-y-4"></div>
                </div>
            </section>

            <section id="aba-financeiro" class="aluno-secao hidden">
                <div id="lista-faturas" class="bg-slate-800/40 rounded-3xl border border-slate-700/50 divide-y divide-slate-700/30"></div>
            </section>

            <section id="aba-dados" class="aluno-secao hidden">
                <div class="bg-slate-800/80 p-6 rounded-3xl border border-slate-700 space-y-6">
                    <div class="text-center">
                        <div class="w-24 h-24 rounded-full border-2 border-cyan-500 mx-auto overflow-hidden relative bg-slate-900 flex items-center justify-center">
                            <img id="edit-preview-foto" class="w-full h-full object-cover hidden">
                            <span id="edit-fallback-foto" class="text-3xl text-slate-600 font-black">?</span>
                            <input type="file" id="input-foto" accept="image/*" onchange="previewImagem(this)" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="edit-tel" placeholder="WhatsApp" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none">
                        <input type="password" id="edit-senha" placeholder="Nova Senha (opcional)" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none">
                    </div>
                    <button onclick="salvarMeusDados()" id="btn-salvar-dados" class="w-full bg-cyan-600 py-4 rounded-xl font-black uppercase text-xs shadow-lg">Salvar Alterações</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 w-full bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 flex justify-around px-2 pt-2 pb-safe z-40">
            <button onclick="mudarAbaAluno('aba-carteirinha')" id="nav-aba-carteirinha" class="nav-btn flex-1 flex flex-col items-center py-2 text-cyan-400">
                <span class="text-2xl mb-1">🪪</span><span class="text-[10px] font-black uppercase">Início</span>
            </button>
            <button onclick="mudarAbaAluno('aba-curriculo')" id="nav-aba-curriculo" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-500">
                <span class="text-2xl mb-1">🥋</span><span class="text-[10px] font-bold uppercase">Histórico</span>
            </button>
            <button onclick="mudarAbaAluno('aba-financeiro')" id="nav-aba-financeiro" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-500">
                <span class="text-2xl mb-1">💰</span><span class="text-[10px] font-bold uppercase">Financeiro</span>
            </button>
            <button onclick="mudarAbaAluno('aba-dados')" id="nav-aba-dados" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-500">
                <span class="text-2xl mb-1">⚙️</span><span class="text-[10px] font-bold uppercase">Ajustes</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, query, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let alunoLogado = null;
        let equipeDados = null;

        // --- SISTEMA DE LOGIN E INÍCIO ---
        window.fazerLoginAluno = async function() {
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const senha = document.getElementById('login-senha').value;
            try {
                const q = query(collection(db, "alunos"), where("email", "==", email), where("senha_portal", "==", senha));
                const snap = await getDocs(q);
                if (snap.empty) { alert("Dados incorretos."); return; }
                alunoLogado = { id: snap.docs[0].id, ...snap.docs[0].data() };
                localStorage.setItem('bjj_aluno_auth', JSON.stringify(alunoLogado));
                iniciarPortal();
            } catch(e) { alert("Erro de conexão."); }
        }

        window.iniciarPortal = async function() {
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-portal').classList.replace('hidden', 'flex');
            document.getElementById('nome-saudacao').innerText = alunoLogado.nome.split(' ')[0].toUpperCase();
            
            // Buscar dados da Equipe
            const eqSnap = await getDoc(doc(db, "equipes", alunoLogado.equipe_id));
            if(eqSnap.exists()) {
                equipeDados = eqSnap.data();
                preencherCarteirinha();
            }
            buscarFaturas();
        }

        window.mudarAbaAluno = function(id) {
            document.querySelectorAll('.aluno-secao').forEach(el => el.classList.replace('block', 'hidden'));
            document.getElementById(id).classList.replace('hidden', 'block');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.replace('text-cyan-400', 'text-slate-500');
                btn.querySelector('span:last-child').classList.replace('font-black', 'font-bold');
            });
            document.getElementById('nav-'+id).classList.replace('text-slate-500', 'text-cyan-400');
            document.getElementById('nav-'+id).querySelector('span:last-child').classList.replace('font-bold', 'font-black');

            if(id === 'aba-curriculo') buscarCurriculoAluno();
        }

// --- LÓGICA DO HISTÓRICO (HISTÓRICO) ---
        async function buscarCurriculoAluno() {
            const divG = document.getElementById('lista-graduacoes');
            const divC = document.getElementById('lista-competicoes');
            divG.innerHTML = "<p class='text-xs text-slate-500 italic'>Buscando linha do tempo...</p>";
            divC.innerHTML = "<p class='text-xs text-slate-500 italic'>Buscando medalhas...</p>";

            try {
                // Adicionado equipe_id para respeitar as regras do Firestore
                const qG = query(collection(db, "graduacoes"), where("equipe_id", "==", alunoLogado.equipe_id), where("aluno_id", "==", alunoLogado.id));
                const qC = query(collection(db, "competicoes"), where("equipe_id", "==", alunoLogado.equipe_id), where("aluno_id", "==", alunoLogado.id));
                const [snapG, snapC] = await Promise.all([getDocs(qG), getDocs(qC)]);

                // Correção vital: Lida tanto com String ('2023-10-10') quanto Timestamp do Firebase
                const parseDataParaTempo = (val) => {
                    if (!val) return 0;
                    if (typeof val.toDate === 'function') return val.toDate().getTime();
                    if (val.seconds) return val.seconds * 1000;
                    const d = new Date(val + (String(val).includes('T') ? '' : 'T12:00:00'));
                    return isNaN(d.getTime()) ? 0 : d.getTime();
                };

                const formataDataBR = (val) => {
                    if (!val) return '--';
                    if (typeof val === 'string' && val.includes('-')) {
                        const p = val.split('-');
                        if(p.length >= 3) return `${p[2]}/${p[1]}/${p[0]}`;
                    }
                    if (typeof val.toDate === 'function') return val.toDate().toLocaleDateString('pt-BR');
                    return String(val);
                };

                // 1. GRADUAÇÕES
                let grads = []; 
                snapG.forEach(d => grads.push(d.data()));
                grads.sort((a,b) => parseDataParaTempo(b.data) - parseDataParaTempo(a.data));

                if(grads.length > 0) {
                    const atual = grads[0];
                    document.getElementById('txt-faixa-atual').innerText = `${atual.faixa} - ${atual.grau || 'Sem grau'}`;
                    document.getElementById('cor-faixa-atual-circulo').style.background = getCorFaixaDupla(atual.faixa);
                    
                    // Calcula o tempo baseado na data blindada
                    document.getElementById('txt-tempo-na-faixa').innerText = calcularTempo(parseDataParaTempo(atual.data));
                    
                    divG.innerHTML = grads.map(g => `
                        <div class="relative pl-8">
                            <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full border-2 border-slate-900" style="background: ${getCorFaixaDupla(g.faixa)}"></div>
                            <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700/30">
                                <p class="text-[10px] font-black text-cyan-400 uppercase">${formataDataBR(g.data)}</p>
                                <p class="text-sm font-bold text-white uppercase">${g.faixa} - ${g.grau || ''}</p>
                            </div>
                        </div>`).join('');
                } else { 
                    document.getElementById('txt-faixa-atual').innerText = "--";
                    document.getElementById('txt-tempo-na-faixa').innerText = "--";
                    divG.innerHTML = "<p class='text-xs text-slate-500 italic'>Nenhum registro encontrado.</p>"; 
                }

                // 2. COMPETIÇÕES
                let comps = []; 
                snapC.forEach(d => comps.push(d.data()));
                comps.sort((a,b) => parseDataParaTempo(b.data) - parseDataParaTempo(a.data));

                if(comps.length > 0) {
                    divC.innerHTML = comps.map(c => {
                        const col = (c.colocacao || "").toLowerCase();
                        let med = "🥋"; let cor = "text-slate-400";
                        if(col.includes("1º") || col.includes("ouro")) { med="🥇"; cor="text-yellow-400"; }
                        else if(col.includes("2º") || col.includes("prata")) { med="🥈"; cor="text-slate-300"; }
                        else if(col.includes("3º") || col.includes("bronze")) { med="🥉"; cor="text-orange-500"; }
                        return `
                        <div class="flex items-center gap-4 bg-slate-800/50 p-4 rounded-2xl border border-slate-700/30">
                            <div class="text-2xl ${cor}">${med}</div>
                            <div class="flex-1 overflow-hidden">
                                <p class="text-[10px] font-black text-slate-400 uppercase">${formataDataBR(c.data)}</p>
                                <p class="text-sm font-bold text-white truncate">${c.nome_evento}</p>
                            </div>
                            <span class="text-[10px] font-black bg-slate-900 px-2 py-1 rounded text-cyan-400 uppercase">${c.colocacao || 'Part.'}</span>
                        </div>`;
                    }).join('');
                } else { divC.innerHTML = "<p class='text-xs text-slate-500 italic'>Nenhum campeonato registrado.</p>"; }
            } catch(e) { 
                console.error(e); 
                divG.innerHTML = "<p class='text-rose-500 text-xs'>Erro ao carregar graduações.</p>"; 
                divC.innerHTML = "<p class='text-rose-500 text-xs'>Erro ao carregar competições.</p>"; 
            }
        }

        // --- AUXILIARES ---
        function calcularTempo(tempoMilissegundos) {
            if (!tempoMilissegundos) return "--";
            const d1 = new Date(tempoMilissegundos);
            const d2 = new Date();
            let meses = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
            if (d2.getDate() < d1.getDate()) meses--;
            
            if (meses < 0) return "Recém graduado";

            const anos = Math.floor(meses / 12);
            const mRest = meses % 12;
            let partes = [];
            if(anos > 0) partes.push(`${anos} ano${anos>1?'s':''}`);
            if(mRest > 0) partes.push(`${mRest} m${mRest>1?'eses':'ês'}`);
            
            return partes.join(' e ') || "Recém graduado";
        }

        // --- AUXILIARES ---
        function calcularTempo(dataStr) {
            const d1 = new Date(dataStr + 'T12:00:00');
            const d2 = new Date();
            let meses = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
            if (d2.getDate() < d1.getDate()) meses--;
            const anos = Math.floor(meses / 12);
            const mRest = meses % 12;
            let partes = [];
            if(anos > 0) partes.push(`${anos} ano${anos>1?'s':''}`);
            if(mRest > 0) partes.push(`${mRest} m${mRest>1?'eses':'ês'}`);
            return partes.join(' e ') || "Recém graduado";
        }

        function getCorFaixaDupla(faixa) {
            const f = faixa ? faixa.toLowerCase() : '';
            if (f.includes('cinza e branca')) return 'linear-gradient(to bottom, #94A3B8 50%, #f8fafc 50%)';
            if (f.includes('cinza e preta')) return 'linear-gradient(to bottom, #94A3B8 50%, #0F172A 50%)';
            if (f.includes('amarela e branca')) return 'linear-gradient(to bottom, #FACC15 50%, #f8fafc 50%)';
            if (f.includes('amarela e preta')) return 'linear-gradient(to bottom, #FACC15 50%, #0F172A 50%)';
            if (f.includes('laranja e branca')) return 'linear-gradient(to bottom, #F97316 50%, #f8fafc 50%)';
            if (f.includes('laranja e preta')) return 'linear-gradient(to bottom, #F97316 50%, #0F172A 50%)';
            if (f.includes('verde e branca')) return 'linear-gradient(to bottom, #16A34A 50%, #f8fafc 50%)';
            if (f.includes('verde e preta')) return 'linear-gradient(to bottom, #16A34A 50%, #0F172A 50%)';
            if (f.includes('branca')) return '#f8fafc'; if (f.includes('cinza')) return '#94A3B8';
            if (f.includes('amarela')) return '#FACC15'; if (f.includes('laranja')) return '#F97316';
            if (f.includes('verde')) return '#16A34A'; if (f.includes('azul')) return '#3b82f6';
            if (f.includes('roxa')) return '#a855f7'; if (f.includes('marrom')) return '#78350f';
            if (f.includes('preta')) return '#0F172A'; return '#cbd5e1'; 
        }

        function preencherCarteirinha() {
            document.getElementById('cart-equipe-nome').innerText = equipeDados.nome_equipe.toUpperCase();
            if(equipeDados.url_logo) { document.getElementById('cart-equipe-logo').src = equipeDados.url_logo; document.getElementById('cart-equipe-logo').classList.remove('hidden'); document.getElementById('cart-equipe-fallback').classList.add('hidden'); }
            document.getElementById('cart-aluno-nome-txt').innerText = alunoLogado.nome.toUpperCase();
            document.getElementById('cart-aluno-faixa-texto').innerText = `${alunoLogado.faixa} - ${alunoLogado.grau || ''}`.toUpperCase();
            document.getElementById('cart-aluno-matricula-txt').innerText = alunoLogado.matricula || '0000';
            document.getElementById('cart-faixa-border').style.background = getCorFaixaDupla(alunoLogado.faixa);
            if(alunoLogado.foto_url) { document.getElementById('cart-aluno-foto-modal').src = alunoLogado.foto_url; document.getElementById('cart-aluno-foto-modal').classList.remove('hidden'); document.getElementById('cart-aluno-foto-fallback-modal').classList.add('hidden'); }
            const qrC = document.getElementById('cart-qr-code'); qrC.innerHTML = ''; new QRCode(qrC, { text: alunoLogado.matricula, width: 64, height: 64 });
        }

        // Restante das funções de financeiro e dados (originais do seu código)...
        async function buscarFaturas() {
            const list = document.getElementById('lista-faturas');
            const q = query(collection(db, "financeiro"), where("aluno_id", "==", alunoLogado.id));
            const snap = await getDocs(q);
            list.innerHTML = snap.empty ? "<p class='p-8 text-center text-slate-500 text-xs'>Sem faturas.</p>" : "";
            snap.forEach(doc => {
                const fat = doc.data();
                const isPago = fat.status === 'PAGO';
                list.innerHTML += `<div class="p-4 flex justify-between items-center bg-slate-800/20">
                    <div><p class="text-sm font-bold text-white">Mês ${fat.mes_ano || '--'}</p><p class="text-[10px] text-slate-500 uppercase">Vencimento: ${fat.vencimento || '--'}</p></div>
                    <div class="text-right"><p class="text-sm font-black ${isPago?'text-emerald-400':'text-rose-400'}">R$ ${fat.valor || '0,00'}</p><span class="text-[9px] font-black uppercase">${fat.status}</span></div>
                </div>`;
            });
        }

        const sessao = localStorage.getItem('bjj_aluno_auth');
        if(sessao) { alunoLogado = JSON.parse(sessao); iniciarPortal(); }

    </script>
