    <script src="menu.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, updateDoc, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uid = null;
        let alunosCache = []; // Somente ATIVOS
        let turmasCache = [];
        let turmaSelecionada = null;
        let turmaEditandoId = null;
        let alunoParaTrocaId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uid = user.uid;
                
                // Preenche os dados do menu.js (Logado e Cargo)
                const emailLogado = document.getElementById('email-logado');
                if(emailLogado) emailLogado.innerText = user.email;

                try {
                    const docSnap = await getDoc(doc(db, "equipes", uid));
                    if (docSnap.exists()) {
                        const lblCargo = document.getElementById('lbl-cargo');
                        if(lblCargo) lblCargo.innerText = "Mestre / Administrador";
                        
                        const nomeEquipe = docSnap.data().nome_equipe;
                        const elNome = document.getElementById('nome-equipe');
                        const elLogo = document.getElementById('logo-equipe');
                        if(elNome) elNome.innerText = nomeEquipe;
                        if(elLogo) elLogo.innerText = nomeEquipe.charAt(0).toUpperCase();
                    } else {
                        const colabSnap = await getDoc(doc(db, "colaboradores", uid));
                        if(colabSnap.exists()) {
                            uid = colabSnap.data().equipe_id;
                            const lblCargo = document.getElementById('lbl-cargo');
                            if(lblCargo) lblCargo.innerText = "Co-Administrador";
                            
                            const equipeMestreSnap = await getDoc(doc(db, "equipes", uid));
                            if(equipeMestreSnap.exists()) {
                                const nomeEquipe = equipeMestreSnap.data().nome_equipe;
                                const elNome = document.getElementById('nome-equipe');
                                const elLogo = document.getElementById('logo-equipe');
                                if(elNome) elNome.innerText = nomeEquipe;
                                if(elLogo) elLogo.innerText = nomeEquipe.charAt(0).toUpperCase();
                            }
                        }
                    }
                } catch (error) { console.log(error); }

                await carregarAlunos(); 
                await carregarTurmas();
                limparInativosDasTurmas(); // ROBÔ DE LIMPEZA
            } else {
                window.location.href = "index.html";
            }
        });

        // === MAGIA DAS DUAS CORES ===
        function getCorFaixa(faixaTexto) {
            const f = faixaTexto ? faixaTexto.toLowerCase() : '';
            if (f.includes('cinza e branca')) return 'bg-[linear-gradient(135deg,_#94A3B8_50%,_#FFFFFF_50%)] text-slate-800 border border-slate-300';
            if (f.includes('cinza e preta')) return 'bg-[linear-gradient(135deg,_#94A3B8_50%,_#0F172A_50%)] text-white border border-slate-500';
            if (f.includes('amarela e branca')) return 'bg-[linear-gradient(135deg,_#FACC15_50%,_#FFFFFF_50%)] text-slate-800 border border-yellow-500';
            if (f.includes('amarela e preta')) return 'bg-[linear-gradient(135deg,_#FACC15_50%,_#0F172A_50%)] text-white border border-yellow-500';
            if (f.includes('laranja e branca')) return 'bg-[linear-gradient(135deg,_#F97316_50%,_#FFFFFF_50%)] text-slate-800 border border-orange-500';
            if (f.includes('laranja e preta')) return 'bg-[linear-gradient(135deg,_#F97316_50%,_#0F172A_50%)] text-white border border-orange-500';
            if (f.includes('verde e branca')) return 'bg-[linear-gradient(135deg,_#16A34A_50%,_#FFFFFF_50%)] text-slate-800 border border-green-600';
            if (f.includes('verde e preta')) return 'bg-[linear-gradient(135deg,_#16A34A_50%,_#0F172A_50%)] text-white border border-green-600';
            if (f.includes('branca')) return 'bg-white text-slate-800 border border-slate-300';
            if (f.includes('cinza')) return 'bg-slate-400 text-white border border-slate-500';
            if (f.includes('amarela')) return 'bg-yellow-400 text-yellow-900 border border-yellow-500';
            if (f.includes('laranja')) return 'bg-orange-500 text-white border border-orange-600';
            if (f.includes('verde')) return 'bg-green-600 text-white border border-green-700';
            if (f.includes('azul')) return 'bg-blue-600 text-white border border-blue-700';
            if (f.includes('roxa')) return 'bg-purple-600 text-white border border-purple-700';
            if (f.includes('marrom')) return 'bg-amber-800 text-white border border-amber-900';
            if (f.includes('preta')) return 'bg-slate-900 text-white border border-slate-900';
            return 'bg-slate-100 text-slate-600 border border-slate-200';
        }

        function calcularIdadeNum(dataNascStr) {
            if (!dataNascStr) return -1;
            try {
                let dt;
                if(dataNascStr.includes('T')) dt = new Date(dataNascStr);
                else if(dataNascStr.includes('-')) {
                    const p = dataNascStr.split('-');
                    dt = new Date(p[0], p[1]-1, p[2]);
                } else return -1;

                if(isNaN(dt.getTime())) return -1;

                const hoje = new Date();
                let idade = hoje.getFullYear() - dt.getFullYear();
                const m = hoje.getMonth() - dt.getMonth();
                if (m < 0 || (m === 0 && hoje.getDate() < dt.getDate())) idade--;
                return idade;
            } catch(e) { return -1; }
        }

        function formatarRegraIdade(min, max) {
            let sMin = (min !== null && min !== undefined && min !== 0) ? min : null;
            let sMax = (max !== null && max !== undefined && max !== 999) ? max : null;
            
            if(sMin === null && sMax === null) return "Idade: Livre";
            if(sMin !== null && sMax === null) return `Idade: ${sMin}+ anos`;
            if(sMin === null && sMax !== null) return `Idade: Até ${sMax} anos`;
            return `Idade: ${sMin} a ${sMax} anos`;
        }

        // ==========================================
        // ROBÔ SILENCIOSO: LIMPEZA DE INATIVOS
        // ==========================================
        async function limparInativosDasTurmas() {
            try {
                const qInativos = query(collection(db, "alunos"), where("equipe_id", "==", uid), where("status", "==", "INATIVO"));
                const snap = await getDocs(qInativos);
                
                const idsInativos = [];
                snap.forEach(doc => idsInativos.push(doc.id));

                if (idsInativos.length === 0) return;

                for (let turma of turmasCache) {
                    let precisaAtualizar = false;
                    let novosIds = [];
                    
                    for (let id of (turma.alunos_ids || [])) {
                        if (idsInativos.includes(id)) {
                            precisaAtualizar = true;
                        } else {
                            novosIds.push(id);
                        }
                    }
                    
                    if (precisaAtualizar) {
                        await updateDoc(doc(db, "turmas", turma.id), {
                            alunos_ids: novosIds
                        });
                        turma.alunos_ids = novosIds;
                    }
                }
                
                renderizarTurmas();
            } catch (e) {
                console.error("Erro na limpeza de inativos: ", e);
            }
        }

        async function carregarAlunos() {
            const q = query(collection(db, "alunos"), where("equipe_id", "==", uid), where("status", "==", "ATIVO"));
            const snap = await getDocs(q);
            alunosCache = [];
            snap.forEach(docSnap => {
                alunosCache.push({ id: docSnap.id, ...docSnap.data() });
            });
            alunosCache.sort((a, b) => a.nome.localeCompare(b.nome));
        }

        // ==========================================
        // GESTÃO DE TURMAS (PAINEL ESQUERDO)
        // ==========================================
        async function carregarTurmas() {
            try {
                const q = query(collection(db, "turmas"), where("equipe_id", "==", uid));
                const snap = await getDocs(q);
                turmasCache = [];
                snap.forEach(docSnap => {
                    turmasCache.push({ id: docSnap.id, ...docSnap.data() });
                });
                
                turmasCache.sort((a, b) => a.nome.localeCompare(b.nome));
                renderizarTurmas();
            } catch (err) {
                console.error("Erro ao carregar turmas:", err);
            }
        }

        function renderizarTurmas() {
            const container = document.getElementById('lista-turmas');
            container.innerHTML = '';
            
            if(turmasCache.length === 0) {
                container.innerHTML = `<p class='text-center p-5 text-slate-400 text-xs font-medium'>Nenhuma turma criada.</p>`;
                return;
            }

            turmasCache.forEach(turma => {
                const count = turma.alunos_ids ? turma.alunos_ids.length : 0;
                const textoIdade = formatarRegraIdade(turma.idade_min, turma.idade_max);

                const item = document.createElement('div');
                item.className = "p-3 mb-2 bg-white border border-slate-100 rounded-xl hover:border-cyan-300 hover:shadow-sm cursor-pointer transition-all flex items-center justify-between group";
                
                item.onclick = (e) => {
                    if(e.target.tagName !== 'BUTTON') selecionarTurma(turma.id);
                };
                
                item.innerHTML = `
                    <div class="flex-1 overflow-hidden pr-2">
                        <h4 class="font-black text-slate-800 text-xs md:text-sm truncate uppercase group-hover:text-cyan-600 transition-colors">${turma.nome}</h4>
                        <p class="text-[9px] md:text-[10px] text-slate-400 font-bold mt-0.5 truncate">${turma.dias || '--'} | ${turma.horario || '--'}</p>
                        <p class="text-[8px] md:text-[9px] text-slate-400 uppercase mt-0.5 truncate">${textoIdade}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="bg-slate-50 text-slate-500 text-[10px] font-black px-2 py-1 rounded shadow-inner border border-slate-100" title="Atletas matriculados">
                            👥 ${count}
                        </div>
                        <div class="flex flex-col gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                            <button onclick="editarTurma('${turma.id}')" class="text-[9px] bg-white border border-cyan-200 px-1.5 py-0.5 rounded text-cyan-600 font-bold hover:bg-cyan-50">✏️</button>
                            <button onclick="excluirTurma('${turma.id}')" class="text-[9px] bg-white border border-rose-200 px-1.5 py-0.5 rounded text-rose-500 font-bold hover:bg-rose-50">🗑️</button>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.salvarTurma = async function() {
            const nome = document.getElementById('turma-nome').value.toUpperCase();
            const dias = document.getElementById('turma-dias').value;
            const horario = document.getElementById('turma-horario').value;
            
            const txtMin = document.getElementById('turma-idade-min').value;
            const txtMax = document.getElementById('turma-idade-max').value;
            
            const iMin = txtMin ? parseInt(txtMin) : 0;
            const iMax = txtMax ? parseInt(txtMax) : 999;

            if (!nome) return alert("O nome da turma é obrigatório!");
            if (iMin > iMax) return alert("A idade mínima não pode ser maior que a máxima.");

            try {
                if (turmaEditandoId) {
                    await updateDoc(doc(db, "turmas", turmaEditandoId), {
                        nome: nome, dias: dias, horario: horario, idade_min: iMin, idade_max: iMax
                    });
                } else {
                    await addDoc(collection(db, "turmas"), {
                        equipe_id: uid, nome: nome, dias: dias, horario: horario, 
                        idade_min: iMin, idade_max: iMax, alunos_ids: []
                    });
                }

                cancelarEdicaoTurma();
                await carregarTurmas();
                
                if (turmaSelecionada && turmaSelecionada.id === turmaEditandoId) {
                    selecionarTurma(turmaEditandoId);
                }

            } catch (error) {
                console.error(error);
                alert("Erro ao salvar turma.");
            }
        }

        window.editarTurma = function(id) {
            const turma = turmasCache.find(t => t.id === id);
            if(!turma) return;

            turmaEditandoId = id;
            document.getElementById('turma-nome').value = turma.nome;
            document.getElementById('turma-dias').value = turma.dias || "";
            document.getElementById('turma-horario').value = turma.horario || "";
            
            document.getElementById('turma-idade-min').value = (turma.idade_min === undefined || turma.idade_min === 0) ? "" : turma.idade_min;
            document.getElementById('turma-idade-max').value = (turma.idade_max === undefined || turma.idade_max === 999) ? "" : turma.idade_max;

            document.getElementById('titulo-form').innerText = "Editar Turma";
            document.getElementById('btn-salvar-turma').innerHTML = "💾 Atualizar";
            document.getElementById('btn-cancelar-turma').classList.remove('hidden');
        }

        window.cancelarEdicaoTurma = function() {
            turmaEditandoId = null;
            document.getElementById('turma-nome').value = "";
            document.getElementById('turma-dias').value = "";
            document.getElementById('turma-horario').value = "";
            document.getElementById('turma-idade-min').value = "";
            document.getElementById('turma-idade-max').value = "";
            
            document.getElementById('titulo-form').innerText = "Nova Turma";
            document.getElementById('btn-salvar-turma').innerHTML = "➕ Criar Turma";
            document.getElementById('btn-cancelar-turma').classList.add('hidden');
        }

        window.excluirTurma = async function(id) {
            if(!confirm("Tem a certeza que deseja apagar esta turma?\n\nOs atletas NÃO serão apagados do sistema, apenas perderão este vínculo de horário.")) return;
            try {
                await deleteDoc(doc(db, "turmas", id));
                if (turmaEditandoId === id) cancelarEdicaoTurma();
                if (turmaSelecionada && turmaSelecionada.id === id) voltarLista();
                carregarTurmas();
            } catch (error) {
                alert("Erro ao excluir turma.");
            }
        }

        // ==========================================
        // GESTÃO DE ALUNOS (PAINEL DIREITO)
        // ==========================================
        window.selecionarTurma = function(id) {
            turmaSelecionada = turmasCache.find(t => t.id === id);
            if(!turmaSelecionada) return;

            document.getElementById('painel-vazio').classList.add('hidden');
            document.getElementById('painel-vazio').classList.remove('md:flex');
            
            const painelDetalhe = document.getElementById('painel-detalhe');
            painelDetalhe.classList.remove('hidden');
            painelDetalhe.classList.add('flex');

            const painelLista = document.getElementById('painel-lista');
            painelLista.classList.add('hidden', 'md:flex'); 
            painelLista.classList.remove('flex');

            document.getElementById('turma-nome-detalhe').innerText = turmaSelecionada.nome;
            document.getElementById('turma-horario-badge').innerText = `${turmaSelecionada.dias || '--'} | ${turmaSelecionada.horario || '--'}`;
            document.getElementById('turma-idade-badge').innerText = formatarRegraIdade(turmaSelecionada.idade_min, turmaSelecionada.idade_max);

            atualizarUIAlunosDaTurma();
        }

        window.voltarLista = function() {
            const painelLista = document.getElementById('painel-lista');
            painelLista.classList.remove('hidden', 'md:flex');
            painelLista.classList.add('flex');
            
            const painelDetalhe = document.getElementById('painel-detalhe');
            painelDetalhe.classList.add('hidden');
            painelDetalhe.classList.remove('flex');
            turmaSelecionada = null;
        }

        function atualizarUIAlunosDaTurma() {
            if(!turmaSelecionada) return;

            const listaIds = turmaSelecionada.alunos_ids || [];
            document.getElementById('turma-contagem').innerText = `Total de Atletas matriculados: ${listaIds.length}`;

            const combo = document.getElementById('combo-add-aluno');
            combo.innerHTML = '<option value="">Selecione um atleta para matricular...</option>';
            
            const disponiveis = alunosCache.filter(a => !listaIds.includes(a.id));
            disponiveis.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.id;
                opt.text = a.nome;
                combo.appendChild(opt);
            });

            const container = document.getElementById('lista-matriculados');
            container.innerHTML = '';

            if(listaIds.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 text-sm mt-10">Turma vazia. Adicione atletas acima ou use o robô.</div>`;
                return;
            }

            const matriculados = alunosCache.filter(a => listaIds.includes(a.id));
            matriculados.sort((a, b) => a.nome.localeCompare(b.nome));

            matriculados.forEach(aluno => {
                const corFaixa = getCorFaixa(aluno.faixa);
                let idadeStr = "--";
                let iNum = calcularIdadeNum(aluno.data_nascimento);
                if(iNum !== -1) idadeStr = iNum + " anos";

                const item = document.createElement('div');
                item.className = "p-3 mb-2 bg-white border border-slate-200 rounded-xl flex items-center justify-between shadow-sm group";
                
                const nomeEscapado = aluno.nome.replace(/'/g, "\\'");

                item.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-full shadow-inner flex items-center justify-center shrink-0 text-[10px] font-black border border-slate-300 ${corFaixa}" title="${aluno.faixa}">🥋</div>
                        <div class="flex-1 truncate">
                            <h4 class="font-black text-slate-800 text-xs md:text-sm truncate">${aluno.nome}</h4>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Idade: ${idadeStr}</p>
                        </div>
                    </div>
                    <button onclick="abrirModalTrocar('${aluno.id}', '${nomeEscapado}')" class="text-[10px] bg-cyan-50 border border-cyan-200 px-3 py-1.5 rounded-lg text-cyan-600 font-bold hover:bg-cyan-500 hover:text-white transition-colors shrink-0 ml-2 shadow-sm flex items-center gap-1">
                        <span>🔄</span> Trocar
                    </button>
                `;
                container.appendChild(item);
            });
        }

        window.adicionarAlunoNaTurma = async function() {
            if(!turmaSelecionada) return;
            const alunoId = document.getElementById('combo-add-aluno').value;
            if(!alunoId) return alert("Selecione um aluno na lista suspensa.");

            try {
                await updateDoc(doc(db, "turmas", turmaSelecionada.id), {
                    alunos_ids: arrayUnion(alunoId)
                });
                
                if(!turmaSelecionada.alunos_ids) turmaSelecionada.alunos_ids = [];
                turmaSelecionada.alunos_ids.push(alunoId);
                
                atualizarUIAlunosDaTurma();
                renderizarTurmas(); 
            } catch (error) {
                console.error(error);
                alert("Erro ao adicionar aluno.");
            }
        }

        // ==========================================
        // FUNCIONALIDADE TROCAR DE TURMA
        // ==========================================
        window.abrirModalTrocar = function(alunoId, alunoNome) {
            if(!turmaSelecionada) return;
            
            alunoParaTrocaId = alunoId;
            document.getElementById('lbl-atleta-troca').innerText = alunoNome;

            const comboNova = document.getElementById('select-nova-turma');
            comboNova.innerHTML = '';
            
            const outrasTurmas = turmasCache.filter(t => t.id !== turmaSelecionada.id);
            
            if(outrasTurmas.length === 0) {
                return alert("Não existem outras turmas para onde transferir o atleta.");
            }

            outrasTurmas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.text = t.nome.toUpperCase();
                comboNova.appendChild(opt);
            });

            document.getElementById('modal-trocar').classList.remove('hidden');
            document.getElementById('modal-trocar').classList.add('flex');
        }

        window.fecharModalTrocar = function() {
            alunoParaTrocaId = null;
            document.getElementById('modal-trocar').classList.add('hidden');
            document.getElementById('modal-trocar').classList.remove('flex');
        }

        window.confirmarTroca = async function() {
            const novaTurmaId = document.getElementById('select-nova-turma').value;
            if(!novaTurmaId) return alert("Selecione a turma de destino!");

            try {
                await updateDoc(doc(db, "turmas", turmaSelecionada.id), {
                    alunos_ids: arrayRemove(alunoParaTrocaId)
                });
                turmaSelecionada.alunos_ids = turmaSelecionada.alunos_ids.filter(id => id !== alunoParaTrocaId);

                await updateDoc(doc(db, "turmas", novaTurmaId), {
                    alunos_ids: arrayUnion(alunoParaTrocaId)
                });
                
                let novaTurma = turmasCache.find(t => t.id === novaTurmaId);
                if(novaTurma) {
                    if(!novaTurma.alunos_ids) novaTurma.alunos_ids = [];
                    novaTurma.alunos_ids.push(alunoParaTrocaId);
                }

                fecharModalTrocar();
                atualizarUIAlunosDaTurma(); 
                renderizarTurmas(); 

            } catch (error) {
                console.error(error);
                alert("Erro ao transferir atleta de turma.");
            }
        }

        // ==========================================
        // O ROBÔ: DISTRIBUIÇÃO AUTOMÁTICA DE IDADE
        // ==========================================
        window.autoDistribuirAlunos = async function() {
            if(turmasCache.length === 0) {
                return alert("Crie primeiro as turmas e defina a Idade Mínima e Máxima em cada uma delas.");
            }

            if(!confirm("🤖 INTELIGÊNCIA ARTIFICIAL\n\nO sistema vai varrer todos os seus atletas ativos e distribuí-los automaticamente pelas turmas que você criou, de acordo com as regras de idade de cada turma.\n\nDeseja prosseguir?")) return;

            try {
                let atualizacoesPendentes = {};
                turmasCache.forEach(t => atualizacoesPendentes[t.id] = []);

                let encontrados = 0;

                alunosCache.forEach(aluno => {
                    let idade = calcularIdadeNum(aluno.data_nascimento);
                    if (idade === -1) return; 

                    turmasCache.forEach(turma => {
                        const min = (turma.idade_min !== undefined && turma.idade_min !== null && turma.idade_min !== "") ? parseInt(turma.idade_min) : 0;
                        const max = (turma.idade_max !== undefined && turma.idade_max !== null && turma.idade_max !== "") ? parseInt(turma.idade_max) : 999;
                        
                        if (idade >= min && idade <= max) {
                            atualizacoesPendentes[turma.id].push(aluno.id);
                        }
                    });
                });

                for (const turmaId in atualizacoesPendentes) {
                    const ids = atualizacoesPendentes[turmaId];
                    if (ids.length > 0) {
                        await updateDoc(doc(db, "turmas", turmaId), { 
                            alunos_ids: arrayUnion(...ids) 
                        });
                        encontrados += ids.length;
                    }
                }

                alert(`✅ Automação finalizada!\n\nForam validadas/adicionadas ${encontrados} matrículas com base nas suas regras de idade.`);
                
                await carregarTurmas();
                if(turmaSelecionada) selecionarTurma(turmaSelecionada.id);

            } catch (e) {
                console.error(e);
                alert("Erro na automação de turmas.");
            }
        }

        window.sairDoSistema = () => signOut(auth).then(() => window.location.href = "index.html");

    </script>
</body>
</html>
