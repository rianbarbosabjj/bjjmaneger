    <script src="menu.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, updateDoc, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uid = null;
        let teamId = null; 
        let alunosCache = [];
        let turmasCache = [];
        let turmaSelecionada = null;
        let turmaEditandoId = null;
        let alunoParaTrocaId = null;
        let equipeDados = { nome: "Sua Equipe", logo: "" };

        window.showToast = function(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-rose-500';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 transform translate-x-0 font-bold text-sm z-50 pointer-events-auto`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const limparAcessando = () => {
                    const aside = document.querySelector('aside');
                    if (aside) {
                        const elementos = aside.querySelectorAll('p, span, h4');
                        elementos.forEach(el => {
                            if (el.innerText.includes('carregando') || el.innerText.includes('rianbarbosa')) el.innerText = user.email;
                            if (el.innerText.includes('ACESSANDO')) {
                                el.innerText = 'ADMINISTRADOR';
                                el.classList.remove('animate-pulse');
                                el.style.opacity = "1";
                            }
                        });
                    }
                };
                limparAcessando(); setTimeout(limparAcessando, 600);

                const mestreDoc = await getDoc(doc(db, "equipes", user.uid));
                if (mestreDoc.exists()) { teamId = user.uid; } 
                else {
                    const colabDoc = await getDoc(doc(db, "colaboradores", user.uid));
                    if (colabDoc.exists()) teamId = colabDoc.data().equipe_id;
                }

                if (teamId) {
                    uid = teamId;
                    await carregarDadosEquipe();
                    await carregarAlunos(); 
                    await carregarTurmas();
                }
            } else { window.location.href = "index.html"; }
        });

        async function carregarDadosEquipe() {
            const eqSnap = await getDoc(doc(db, "equipes", teamId));
            if (eqSnap.exists()) {
                const d = eqSnap.data();
                equipeDados.nome = d.nome_equipe || d.nome || "Sua Equipe";
                equipeDados.logo = d.url_logo || "";
                
                const elNomeEquipeMenu = document.querySelector('aside h2') || document.getElementById('nome-equipe');
                if(elNomeEquipeMenu) elNomeEquipeMenu.innerText = equipeDados.nome.toUpperCase();

                const elLogoMenu = document.getElementById('logo-equipe-menu') || document.getElementById('container-logo') || document.querySelector('aside div[class*="bg-cyan-"], aside div[class*="bg-blue-"]');
                if (elLogoMenu) {
                    if (equipeDados.logo) {
                        elLogoMenu.style.background = 'transparent';
                        elLogoMenu.innerHTML = `<img src="${equipeDados.logo}" class="w-full h-full object-cover rounded-xl shadow-md" alt="Logo">`;
                    } else {
                        elLogoMenu.style.background = '';
                        elLogoMenu.innerHTML = `<span class="text-white font-black text-2xl">${equipeDados.nome.charAt(0).toUpperCase()}</span>`;
                    }
                }
            }
        }

        function formatarDiasSemanas(diasData) {
            if (!diasData) return "--";
            if (typeof diasData === 'string') return diasData;
            if (Array.isArray(diasData)) {
                if (diasData.length === 0) return "--";
                const mapaDias = {0: 'Dom', 1: 'Seg', 2: 'Ter', 3: 'Qua', 4: 'Qui', 5: 'Sex', 6: 'Sáb'};
                return diasData.sort().map(d => mapaDias[d]).join('/');
            }
            return "--";
        }

        function formatarHorarioBox(h_inicio, h_fim, legado) {
            if (h_inicio) return `${h_inicio}${h_fim ? `-${h_fim}` : ''}`;
            return legado || '--:--';
        }

        function getEstiloFaixa(faixa) {
            const faixasInfo = {
                'Branca': 'background-color: #ffffff',
                'Cinza e branca': 'background: linear-gradient(135deg, #94a3b8 50%, #ffffff 50%)',
                'Cinza': 'background-color: #94a3b8',
                'Cinza e preta': 'background: linear-gradient(135deg, #94a3b8 50%, #000000 50%)',
                'Amarela e branca': 'background: linear-gradient(135deg, #eab308 50%, #ffffff 50%)',
                'Amarela': 'background-color: #eab308',
                'Amarela e preta': 'background: linear-gradient(135deg, #eab308 50%, #000000 50%)',
                'Laranja e branca': 'background: linear-gradient(135deg, #f97316 50%, #ffffff 50%)',
                'Laranja': 'background-color: #f97316',
                'Laranja e preta': 'background: linear-gradient(135deg, #f97316 50%, #000000 50%)',
                'Verde e branca': 'background: linear-gradient(135deg, #22c55e 50%, #ffffff 50%)',
                'Verde': 'background-color: #22c55e',
                'Verde e preta': 'background: linear-gradient(135deg, #22c55e 50%, #000000 50%)',
                'Azul': 'background-color: #3b82f6',
                'Roxa': 'background-color: #a855f7',
                'Marrom': 'background-color: #78350f',
                'Preta': 'background-color: #000000',
                'Coral': 'background: linear-gradient(135deg, #ef4444 50%, #000000 50%)',
                'Vermelha': 'background-color: #dc2626'
            };
            const f = faixa ? faixa.charAt(0).toUpperCase() + faixa.slice(1).toLowerCase().trim() : 'Branca';
            return faixasInfo[f] || 'background-color: #cbd5e1';
        }

        function calcularIdadeNum(data) {
            if (!data) return -1;
            const dt = data.includes('-') ? new Date(data.split('-')[0], data.split('-')[1]-1, data.split('-')[2]) : new Date(data);
            if(isNaN(dt.getTime())) return -1;
            const hoje = new Date();
            let idade = hoje.getFullYear() - dt.getFullYear();
            if (hoje.getMonth() < dt.getMonth() || (hoje.getMonth() === dt.getMonth() && hoje.getDate() < dt.getDate())) idade--;
            return idade;
        }

        function formatarRegraIdade(min, max) {
            if(!min && (!max || max === 999)) return "Idade: Livre";
            if(min && (!max || max === 999)) return `Idade: ${min}+ anos`;
            if(!min && max) return `Idade: Até ${max} anos`;
            return `Idade: ${min} a ${max} anos`;
        }

        async function limparInativosDasTurmas() {
            const q = query(collection(db, "alunos"), where("equipe_id", "==", uid), where("status", "==", "INATIVO"));
            const snap = await getDocs(q);
            const idsInativos = snap.docs.map(d => d.id);
            if (idsInativos.length === 0) return;
            for (let t of turmasCache) {
                const novosIds = (t.alunos_ids || []).filter(id => !idsInativos.includes(id));
                if (novosIds.length !== (t.alunos_ids || []).length) {
                    await updateDoc(doc(db, "turmas", t.id), { alunos_ids: novosIds });
                    t.alunos_ids = novosIds;
                }
            }
            renderizarTurmas();
        }

        async function carregarAlunos() {
            const q = query(collection(db, "alunos"), where("equipe_id", "==", uid), where("status", "==", "ATIVO"));
            const snap = await getDocs(q);
            alunosCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.nome.localeCompare(b.nome));
        }

        async function carregarTurmas() {
            const q = query(collection(db, "turmas"), where("equipe_id", "==", uid));
            const snap = await getDocs(q);
            turmasCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.nome.localeCompare(b.nome));
            renderizarTurmas();
        }

        function renderizarTurmas() {
            const container = document.getElementById('lista-turmas');
            container.innerHTML = turmasCache.length === 0 ? "<p class='text-center p-5 text-slate-400 text-xs'>Nenhuma turma criada.</p>" : "";
            
            turmasCache.forEach(t => {
                const div = document.createElement('div');
                div.id = `card-turma-${t.id}`;
                div.className = "card-turma p-3 mb-3 bg-white border border-slate-200 rounded-xl hover:border-cyan-400 cursor-pointer transition-all flex flex-col gap-2 group shadow-[0_2px_10px_-3px_rgba(0,0,0,0.05)]";
                
                let strDias = formatarDiasSemanas(t.dias_semana || t.dias);
                let strHorario = formatarHorarioBox(t.hora_inicio, t.hora_fim, t.horario);

                div.innerHTML = `
                    <div class="flex items-center justify-between" onclick="selecionarTurma('${t.id}')">
                        <div>
                            <h4 class='font-black text-xs uppercase text-slate-800 group-hover:text-cyan-600 transition-colors'>${t.nome}</h4>
                            <p class='text-[9px] text-slate-400 font-bold mt-0.5'>${strDias} | ${strHorario}</p>
                        </div>
                        <div class='bg-slate-100 text-slate-600 group-hover:bg-cyan-50 group-hover:text-cyan-600 text-[10px] font-black px-2 py-1 rounded-lg border border-slate-200 group-hover:border-cyan-200 transition-colors shadow-sm'>
                            👥 ${(t.alunos_ids||[]).length}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 pt-2 border-t border-slate-100 mt-1">
                        <button onclick="editarTurma('${t.id}')" class="flex-1 bg-slate-50 hover:bg-amber-50 text-slate-500 hover:text-amber-600 text-[9px] font-black py-2 rounded-lg transition-colors flex items-center justify-center gap-1 uppercase tracking-widest border border-transparent hover:border-amber-200">✏️ Editar</button>
                        <button onclick="excluirTurma('${t.id}')" class="flex-1 bg-slate-50 hover:bg-rose-50 text-slate-500 hover:text-rose-600 text-[9px] font-black py-2 rounded-lg transition-colors flex items-center justify-center gap-1 uppercase tracking-widest border border-transparent hover:border-rose-200">🗑️ Excluir</button>
                    </div>
                `;
                container.appendChild(div);
            });

            if (turmasCache.length > 0) {
                if (!turmaSelecionada || !turmasCache.find(t => t.id === turmaSelecionada.id)) {
                    if (window.innerWidth >= 768) { selecionarTurma(turmasCache[0].id); }
                } else {
                    selecionarTurma(turmaSelecionada.id); 
                }
            } else {
                document.getElementById('detalhe-vazio').classList.remove('hidden');
                document.getElementById('detalhe-conteudo').classList.add('hidden');
                document.getElementById('detalhe-conteudo').classList.remove('flex');
            }
        }

        window.salvarTurma = async function() {
            const nome = document.getElementById('turma-nome').value.toUpperCase().trim();
            const min = parseInt(document.getElementById('turma-idade-min').value) || 0;
            const max = parseInt(document.getElementById('turma-idade-max').value) || 999;
            const hora_inicio = document.getElementById('turma-hora-inicio').value;
            const hora_fim = document.getElementById('turma-hora-fim').value;

            const checkboxesDias = document.querySelectorAll('.chk-dia:checked');
            const dias_semana = Array.from(checkboxesDias).map(cb => parseInt(cb.value));

            if (!nome) return showToast("Nome da turma é obrigatório", "error");
            if (dias_semana.length === 0) return showToast("Selecione os dias de treino", "error");
            if (!hora_inicio) return showToast("Hora de início é obrigatória", "error");
            
            const btn = document.getElementById('btn-salvar-turma');
            btn.disabled = true; btn.innerHTML = "⏳ Salvando...";

            try {
                const dados = { 
                    nome: nome, 
                    dias_semana: dias_semana, 
                    hora_inicio: hora_inicio, 
                    hora_fim: hora_fim,
                    idade_min: min, 
                    idade_max: max 
                };

                if (turmaEditandoId) {
                    await updateDoc(doc(db, "turmas", turmaEditandoId), dados);
                    showToast("Turma atualizada!", "success");
                } else {
                    await addDoc(collection(db, "turmas"), { ...dados, equipe_id: uid, alunos_ids: [] });
                    showToast("Turma criada!", "success");
                }
                
                cancelarEdicaoTurma(); 
                carregarTurmas();
                
            } catch (e) { 
                showToast("Erro ao salvar", "error"); 
            } finally {
                btn.disabled = false; btn.innerHTML = "➕ Criar Turma";
            }
        }

        window.editarTurma = function(id) {
            const t = turmasCache.find(x => x.id === id);
            if(!t) return;
            turmaEditandoId = id;
            document.getElementById('turma-nome').value = t.nome || "";
            document.getElementById('turma-idade-min').value = t.idade_min || "";
            document.getElementById('turma-idade-max').value = t.idade_max || "";
            document.getElementById('turma-hora-inicio').value = t.hora_inicio || "";
            document.getElementById('turma-hora-fim').value = t.hora_fim || "";

            document.querySelectorAll('.chk-dia').forEach(cb => cb.checked = false);
            if(Array.isArray(t.dias_semana)) {
                t.dias_semana.forEach(d => {
                    const cb = document.querySelector(`.chk-dia[value="${d}"]`);
                    if(cb) cb.checked = true;
                });
            }

            document.getElementById('titulo-form').innerText = "✏️ Editar Turma";
            document.getElementById('btn-salvar-turma').innerText = "💾 Salvar";
            document.getElementById('btn-cancelar-turma').classList.remove('hidden');
        }

        window.excluirTurma = async function(id) {
            if(!confirm("Tem certeza que deseja excluir esta turma? Os alunos não serão excluídos, apenas ficarão sem turma associada.")) return;
            try {
                await deleteDoc(doc(db, "turmas", id));
                showToast("Turma excluída com sucesso!", "success");
                if (turmaSelecionada && turmaSelecionada.id === id) voltarLista();
                carregarTurmas();
            } catch(e) {
                showToast("Erro ao excluir.", "error");
            }
        }

        window.cancelarEdicaoTurma = () => {
            turmaEditandoId = null;
            document.querySelectorAll('#painel-lista input[type="text"], #painel-lista input[type="number"], #painel-lista input[type="time"]').forEach(i => i.value = "");
            document.querySelectorAll('.chk-dia').forEach(cb => cb.checked = false);
            
            document.getElementById('titulo-form').innerHTML = "Nova Turma";
            document.getElementById('btn-salvar-turma').innerText = "➕ Criar Turma";
            document.getElementById('btn-cancelar-turma').classList.add('hidden');
        }

        window.selecionarTurma = (id) => {
            turmaSelecionada = turmasCache.find(t => t.id === id);
            
            if (window.innerWidth < 768) {
                document.getElementById('painel-lista').classList.add('hidden');
                document.getElementById('painel-detalhe').classList.remove('hidden');
                document.getElementById('painel-detalhe').classList.add('flex');
            }

            document.getElementById('detalhe-vazio').classList.add('hidden');
            document.getElementById('detalhe-conteudo').classList.remove('hidden');
            document.getElementById('detalhe-conteudo').classList.add('flex');
            
            let strDias = formatarDiasSemanas(turmaSelecionada.dias_semana || turmaSelecionada.dias);
            let strHorario = formatarHorarioBox(turmaSelecionada.hora_inicio, turmaSelecionada.hora_fim, turmaSelecionada.horario);

            document.getElementById('turma-nome-detalhe').innerText = turmaSelecionada.nome;
            document.getElementById('turma-horario-badge').innerText = `${strDias} | ${strHorario}`;
            document.getElementById('turma-idade-badge').innerText = formatarRegraIdade(turmaSelecionada.idade_min, turmaSelecionada.idade_max);
            
            document.querySelectorAll('.card-turma').forEach(el => el.classList.remove('border-cyan-500', 'bg-cyan-50/30'));
            const cardAtivo = document.getElementById('card-turma-' + id);
            if (cardAtivo) cardAtivo.classList.add('border-cyan-500', 'bg-cyan-50/30');

            atualizarUIAlunosDaTurma();
        }

        window.voltarLista = () => {
            if (window.innerWidth < 768) {
                document.getElementById('painel-lista').classList.remove('hidden');
                document.getElementById('painel-detalhe').classList.add('hidden');
                document.getElementById('painel-detalhe').classList.remove('flex');
            }
        }

        function atualizarUIAlunosDaTurma() {
            if(!turmaSelecionada) return;
            const ids = turmaSelecionada.alunos_ids || [];
            document.getElementById('turma-contagem').innerText = `Matriculados: ${ids.length}`;
            
            const combo = document.getElementById('combo-add-aluno');
            combo.innerHTML = '<option value="">Selecionar atleta para matricular...</option>';
            alunosCache.filter(a => !ids.includes(a.id)).forEach(a => combo.add(new Option(a.nome, a.id)));
            
            const container = document.getElementById('lista-matriculados');
            container.innerHTML = ids.length === 0 ? "<p class='text-center mt-10 text-slate-400 text-sm italic'>Nenhum atleta nesta turma.</p>" : "";
            
            alunosCache.filter(a => ids.includes(a.id)).forEach(al => {
                const item = document.createElement('div');
                item.className = "p-3 mb-2 bg-white border border-slate-200 rounded-xl flex items-center justify-between shadow-sm hover:shadow-md transition-shadow";
                item.innerHTML = `
                    <div class='flex items-center gap-3'>
                        <div class='w-8 h-8 rounded-full border border-slate-300 shadow-inner shrink-0' style='${getEstiloFaixa(al.faixa)}'></div>
                        <div class='overflow-hidden pr-2'>
                            <h4 class='font-black text-xs text-slate-800 truncate'>${al.nome}</h4>
                            <p class='text-[9px] text-slate-400 uppercase font-medium mt-0.5 truncate'>${al.faixa} • ${calcularIdadeNum(al.data_nascimento)} anos</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <button onclick="abrirModalTrocar('${al.id}', '${al.nome.replace(/'/g, "\\'")}')" class='text-[10px] bg-cyan-50 hover:bg-cyan-100 text-cyan-600 border border-cyan-200 px-3 py-1.5 rounded-lg font-bold transition-colors shadow-sm' title="Mover para outra turma">🔄</button>
                        <button onclick="removerAlunoDaTurma('${al.id}')" class='text-[10px] bg-rose-50 hover:bg-rose-100 text-rose-500 border border-rose-200 px-3 py-1.5 rounded-lg font-bold transition-colors shadow-sm' title="Remover da turma">❌</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.adicionarAlunoNaTurma = async () => {
            const id = document.getElementById('combo-add-aluno').value;
            if(!id) return;
            await updateDoc(doc(db, "turmas", turmaSelecionada.id), { alunos_ids: arrayUnion(id) });
            turmaSelecionada.alunos_ids.push(id);
            showToast("Atleta matriculado com sucesso!", "success"); 
            atualizarUIAlunosDaTurma(); 
            carregarTurmas();
        }

        window.removerAlunoDaTurma = async function(alunoId) {
            if(!confirm("Remover este atleta da turma?")) return;
            try {
                await updateDoc(doc(db, "turmas", turmaSelecionada.id), { alunos_ids: arrayRemove(alunoId) });
                turmaSelecionada.alunos_ids = turmaSelecionada.alunos_ids.filter(id => id !== alunoId);
                showToast("Atleta removido da turma!", "success");
                atualizarUIAlunosDaTurma();
                carregarTurmas();
            } catch(e) {
                showToast("Erro ao remover.", "error");
            }
        }

        window.abrirModalTrocar = (id, nome) => {
            alunoParaTrocaId = id;
            document.getElementById('lbl-atleta-troca').innerText = nome;
            const s = document.getElementById('select-nova-turma');
            s.innerHTML = '';
            turmasCache.filter(t => t.id !== turmaSelecionada.id).forEach(t => s.add(new Option(t.nome, t.id)));
            document.getElementById('modal-trocar').classList.remove('hidden');
            document.getElementById('modal-trocar').classList.add('flex');
        }

        window.fecharModalTrocar = () => document.getElementById('modal-trocar').classList.add('hidden');

        window.confirmarTroca = async () => {
            const novaId = document.getElementById('select-nova-turma').value;
            await updateDoc(doc(db, "turmas", turmaSelecionada.id), { alunos_ids: arrayRemove(alunoParaTrocaId) });
            await updateDoc(doc(db, "turmas", novaId), { alunos_ids: arrayUnion(alunoParaTrocaId) });
            showToast("Transferido com sucesso!", "success"); 
            fecharModalTrocar(); 
            carregarTurmas(); 
            voltarLista();
        }

        window.autoDistribuirAlunos = async () => {
            if(!confirm("O robô vai distribuir os alunos pelas regras de idade de cada turma. Continuar?")) return;
            let count = 0;
            for(let al of alunosCache) {
                let idade = calcularIdadeNum(al.data_nascimento);
                if(idade === -1) continue;
                for(let t of turmasCache) {
                    if(idade >= (t.idade_min||0) && idade <= (t.idade_max||999)) {
                        if (!(t.alunos_ids && t.alunos_ids.includes(al.id))) {
                            await updateDoc(doc(db, "turmas", t.id), { alunos_ids: arrayUnion(al.id) });
                            count++;
                        }
                    }
                }
            }
            showToast(`${count} matrículas realizadas!`, "success"); 
            carregarTurmas();
        }
    </script>
</body>
</html>
