<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validação de Documento | BJJ Manager</title>
    
    <link rel="icon" type="image/png" href="logo_bjj_maneger.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; }
    </style>
</head>
<body class="text-slate-200 min-h-[100dvh] flex flex-col items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] bg-cyan-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="mb-8 text-center relative z-10">
        <img src="logo_bjj_maneger.png" class="h-16 mx-auto mb-4" alt="BJJ Manager">
        <h1 class="text-sm font-black uppercase tracking-[0.3em] text-cyan-500">Central de Validação</h1>
    </div>

    <div id="card-validacao" class="w-full max-w-sm bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-slate-700 p-8 text-center relative z-10">
        
        <div id="estado-loading" class="flex flex-col items-center justify-center py-10">
            <div class="w-12 h-12 border-4 border-slate-600 border-t-cyan-500 rounded-full animate-spin mb-6"></div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" id="loading-text">Conectando...</p>
        </div>

        <div id="estado-sucesso" class="hidden flex-col items-center">
            <div class="w-16 h-16 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center text-3xl mb-4 shadow-[0_0_30px_rgba(16,185,129,0.2)]">✓</div>
            <h2 class="text-xl font-black text-white uppercase tracking-tight mb-1">Documento Válido</h2>
            <p class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest mb-8">Autenticidade Confirmada</p>

            <div class="w-24 h-24 rounded-full border-4 border-slate-700 bg-slate-900 mb-4 overflow-hidden relative shadow-lg flex items-center justify-center">
                <img id="val-foto" src="" class="w-full h-full object-cover hidden">
                <div id="val-foto-fallback" class="w-full h-full flex items-center justify-center text-4xl font-black text-slate-600"></div>
            </div>

            <h3 id="val-nome" class="text-lg font-black text-white uppercase mb-1 leading-tight">NOME DO ATLETA</h3>
            <p id="val-faixa" class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest mb-6">FAIXA</p>

            <div class="w-full bg-slate-900/80 rounded-2xl p-5 border border-slate-700/50 text-left space-y-4">
                <div>
                    <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Equipe / Academia</p>
                    <p id="val-equipe" class="text-xs font-black text-white break-words">Buscando equipe...</p>
                </div>
                <div class="flex justify-between items-end border-t border-slate-800 pt-3">
                    <div>
                        <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Matrícula</p>
                        <p id="val-matricula" class="text-xs font-mono font-bold text-slate-300">00000</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Status</p>
                        <p id="val-status" class="text-xs font-black text-emerald-400 uppercase">ATIVO</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="estado-erro" class="hidden flex-col items-center py-8">
            <div class="w-20 h-20 bg-rose-500/20 text-rose-500 rounded-full flex items-center justify-center text-4xl mb-6 shadow-[0_0_30px_rgba(244,63,94,0.3)]">✗</div>
            <h2 class="text-xl font-black text-white uppercase tracking-tight mb-2">Registo Inválido</h2>
            <p class="text-xs text-slate-400 leading-relaxed px-4" id="erro-motivo">Este atleta não foi encontrado na base de dados oficial.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        try {
            const params = new URLSearchParams(window.location.search);
            const matriculaRef = params.get('mat');

            window.onload = async () => {
                if(!matriculaRef) {
                    mostrarErro("Nenhum código de validação fornecido no QR Code.");
                    return;
                }

                let alunoData = null;
                
                // 1. Tenta por Matrícula
                const q = query(collection(db, "alunos"), where("matricula", "==", matriculaRef));
                const snap = await getDocs(q);
                
                if(!snap.empty) {
                    alunoData = snap.docs[0].data();
                } else {
                    // 2. Tenta por ID antigo
                    const d = await getDoc(doc(db, "alunos", matriculaRef));
                    if(d.exists()) alunoData = d.data();
                }
                
                if(alunoData) {
                    // Limpa o ID e trata se ele for um [object Object] acidental
                    let idDaEquipe = alunoData.equipe_id || alunoData.equipeId;
                    if (typeof idDaEquipe === 'object') idDaEquipe = String(idDaEquipe);
                    idDaEquipe = String(idDaEquipe || "").trim();
                    
                    const elEquipe = document.getElementById('val-equipe');
                    
                    if(idDaEquipe && idDaEquipe !== "undefined" && idDaEquipe !== "null") {
                        const eqSnap = await getDoc(doc(db, "equipes", idDaEquipe));
                        if(eqSnap.exists()) {
                            const eqData = eqSnap.data();
                            elEquipe.innerText = (eqData.nome_equipe || eqData.nome || "Academia Sem Nome").toUpperCase();
                        } else {
                            // MODO RAIO-X: Imprime o ID errado que está guardado no aluno
                            elEquipe.innerText = `NÃO ENCONTRADA (ID: ${idDaEquipe})`;
                            elEquipe.classList.add("text-rose-400");
                        }
                    } else {
                        elEquipe.innerText = "ALUNO SEM EQUIPA REGISTADA";
                        elEquipe.classList.add("text-amber-400");
                    }

                    document.getElementById('val-nome').innerText = alunoData.nome || "Atleta";
                    
                    const faixa = alunoData.faixa || 'BRANCA';
                    const grau = (alunoData.grau && alunoData.grau !== 'Sem grau') ? ` - ${alunoData.grau}` : '';
                    document.getElementById('val-faixa').innerText = (faixa + grau).toUpperCase();
                    
                    document.getElementById('val-matricula').innerText = alunoData.matricula || matriculaRef;
                    
                    const elStatus = document.getElementById('val-status');
                    elStatus.innerText = alunoData.status || 'ATIVO';
                    if(alunoData.status === 'INATIVO') {
                        elStatus.classList.replace('text-emerald-400', 'text-rose-500');
                    }

                    if(alunoData.foto_url) {
                        document.getElementById('val-foto').src = alunoData.foto_url;
                        document.getElementById('val-foto').classList.remove('hidden');
                    } else {
                        document.getElementById('val-foto-fallback').innerText = (alunoData.nome ? alunoData.nome.charAt(0).toUpperCase() : "?");
                    }

                    document.getElementById('estado-loading').classList.add('hidden');
                    document.getElementById('estado-sucesso').classList.remove('hidden');
                    document.getElementById('estado-sucesso').classList.add('flex');
                } else {
                    mostrarErro("O atleta com a matrícula " + matriculaRef + " não foi encontrado no sistema.");
                }
            };
        } catch(e) {
            mostrarErro("Erro no sistema: " + e.message);
        }

        function mostrarErro(motivo = "Este atleta não foi encontrado na base de dados oficial ou a matrícula encontra-se revogada.") {
            document.getElementById('estado-loading').classList.add('hidden');
            document.getElementById('erro-motivo').innerText = motivo;
            document.getElementById('estado-erro').classList.remove('hidden');
            document.getElementById('estado-erro').classList.add('flex');
        }
    </script>
</body>
</html>
